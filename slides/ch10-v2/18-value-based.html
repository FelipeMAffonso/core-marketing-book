<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 18 &middot; Value-based</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .exh .head{ margin-bottom:24px; }
  .exh .head .title{ font-size:80px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; }
  .exh .head .sub{ margin-top:10px; font-size:36px; color:var(--ink-soft); line-height:1.35; max-width:60ch; }
  .exh .head .sub em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:18px; }

  .exh .frame{ background:var(--bg); border:2px solid var(--rule); padding:24px 32px 16px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .exh .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .exh svg{ width:100%; flex:1; min-height:0; display:block; }
  .exh .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Value-based</h1>
      <p class="sub">Price is set as a function of the buyer's willingness-to-pay, <em>built from the competitor reference upward</em>.</p>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Economic value to the customer (EVC) walk &middot; one heavy-duty truck</span>
      <svg viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="A cumulative waterfall chart. The reference competitor anchors at $120,000. Four positive value drivers stack upward in sequence — durability adds $8k, downtime reliability adds $12k, fuel economy adds $15k, resale value adds $9k. Training cost subtracts $2k. The accumulated total reaches an EVC ceiling of $162k. The proposed value-based price is set at $148k, leaving the buyer with $14k of surplus.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- baseline -->
          <line x1="100" y1="500" x2="1500" y2="500" stroke="#7A7A7A" stroke-width="2"/>

          <!-- y axis ticks for thousands -->
          <g font-size="36" fill="#7A7A7A" text-anchor="end">
            <text x="90" y="508">$0</text>
            <text x="90" y="380">$60k</text>
            <text x="90" y="252">$120k</text>
            <text x="90" y="155">$162k</text>
          </g>
          <line x1="100" y1="372" x2="1500" y2="372" stroke="#E8E6E1" stroke-dasharray="4,6"/>
          <line x1="100" y1="244" x2="1500" y2="244" stroke="#E8E6E1" stroke-dasharray="4,6"/>

          <!-- waterfall: cumulative stack. competitor anchor at $120k -->
          <!-- scale: $1k = 2.13px height; baseline y=500, top of $120k = y=244 (height 256) -->
          <!-- 1: competitor anchor 120k -->
          <rect x="160" y="244" width="180" height="256" fill="#BDB7AC" stroke="#7A7A7A" stroke-width="1.5"/>
          <text x="250" y="226" text-anchor="middle" font-size="36" font-weight="700">$120k</text>
          <text x="250" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">competitor</text>

          <!-- 2: durability +8k → from 244 up to 226.9 ≈ 227 -->
          <rect x="360" y="227" width="180" height="17" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="340" y1="244" x2="360" y2="244" stroke="#7A7A7A" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="450" y="209" text-anchor="middle" font-size="36" font-weight="700">+ $8k</text>
          <text x="450" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">durability</text>

          <!-- 3: downtime +12k → from 227 up to 201.4 ≈ 201 -->
          <rect x="560" y="201" width="180" height="26" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="540" y1="227" x2="560" y2="227" stroke="#7A7A7A" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="650" y="183" text-anchor="middle" font-size="36" font-weight="700">+ $12k</text>
          <text x="650" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">downtime</text>

          <!-- 4: fuel +15k → from 201 up to 169 -->
          <rect x="760" y="169" width="180" height="32" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="740" y1="201" x2="760" y2="201" stroke="#7A7A7A" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="850" y="151" text-anchor="middle" font-size="36" font-weight="700">+ $15k</text>
          <text x="850" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">fuel economy</text>

          <!-- 5: resale +9k → from 169 up to 150 -->
          <rect x="960" y="150" width="180" height="19" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="940" y1="169" x2="960" y2="169" stroke="#7A7A7A" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="1050" y="132" text-anchor="middle" font-size="36" font-weight="700">+ $9k</text>
          <text x="1050" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">resale value</text>

          <!-- 6: training -2k → top steps DOWN from 150 to 154.3 ≈ 154 (drops by 4.3) -->
          <rect x="1160" y="150" width="180" height="4" fill="#F1C8B6" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="1140" y1="150" x2="1160" y2="150" stroke="#7A7A7A" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="1250" y="132" text-anchor="middle" font-size="36" font-weight="700">&minus; $2k</text>
          <text x="1250" y="556" text-anchor="middle" font-size="36" fill="#5C5C5C">training</text>

          <!-- 7: EVC ceiling final bar at $162k → height 346, top y=154 -->
          <rect x="1360" y="154" width="140" height="346" fill="#DA7756" opacity="0.30" stroke="#DA7756" stroke-width="2"/>
          <line x1="1340" y1="154" x2="1360" y2="154" stroke="#DA7756" stroke-width="2" stroke-dasharray="3,3"/>
          <text x="1430" y="136" text-anchor="middle" font-size="40" font-weight="700" fill="#B8553A">$162k</text>
          <text x="1430" y="556" text-anchor="middle" font-size="36" font-weight="700" fill="#B8553A">EVC ceiling</text>

          <!-- proposed price marker -->
          <line x1="100" y1="184" x2="1500" y2="184" stroke="#DA7756" stroke-width="3" stroke-dasharray="10,6"/>
          <text x="100" y="74" font-size="40" font-weight="700" fill="#B8553A">value-based price $148k</text>
          <text x="100" y="116" font-size="36" fill="#B8553A" font-style="italic">leaves the buyer $14k of consumer surplus</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Forbis &amp; Mehta, <em>Industrial Marketing Management</em> (1981); Anderson, Jain &amp; Chintagunta, <em>JBBM</em> (1993).</p>
  </section>
</body>
</html>
