<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 29 &middot; Indianapolis Zoo</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .exh .head{ margin-bottom:24px; }
  .exh .head .title{ font-size:80px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; }
  .exh .head .sub{ margin-top:10px; font-size:36px; color:var(--ink-soft); line-height:1.35; max-width:60ch; }
  .exh .head .sub em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:18px; }

  .exh .frame{ background:var(--bg); border:2px solid var(--rule); padding:24px 32px 16px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .exh .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .exh svg{ width:100%; flex:1; min-height:0; display:block; }
  .exh .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Indianapolis Zoo</h1>
      <p class="sub">The same dynamic logic applies, but it serves an <em>equity goal</em> rather than maximizing margin.</p>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Demand-based admission &middot; 2014 launch &middot; daily price band</span>
      <svg viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="Seven daily admission price bars across one week. Monday through Wednesday off-peak prices sit near $9 in coral. Thursday rises to $13, Friday to $17, and weekend peaks at $21.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <line x1="120" y1="500" x2="1480" y2="500" stroke="#7A7A7A" stroke-width="2"/>
          <line x1="120" y1="60"  x2="120"  y2="500" stroke="#E8E6E1" stroke-width="1.5"/>

          <g font-size="36" fill="#7A7A7A" text-anchor="end">
            <text x="105" y="508">$0</text>
            <text x="105" y="367">$10</text>
            <text x="105" y="226">$20</text>
          </g>
          <line x1="120" y1="360" x2="1480" y2="360" stroke="#E8E6E1" stroke-dasharray="4,6"/>
          <line x1="120" y1="220" x2="1480" y2="220" stroke="#E8E6E1" stroke-dasharray="4,6"/>

          <!-- 7 bars: $9, $9, $9, $13, $17, $21, $21. Range 460 (60→500). $1 = 21px -->
          <g font-size="40" font-weight="700" text-anchor="middle">
            <rect x="190" y="374" width="140" height="126" fill="#DA7756"/>
            <text x="260" y="354">$9</text>
            <text x="260" y="556" fill="#5C5C5C" font-weight="500">Mon</text>

            <rect x="350" y="374" width="140" height="126" fill="#DA7756"/>
            <text x="420" y="354">$9</text>
            <text x="420" y="556" fill="#5C5C5C" font-weight="500">Tue</text>

            <rect x="510" y="374" width="140" height="126" fill="#DA7756"/>
            <text x="580" y="354">$9</text>
            <text x="580" y="556" fill="#5C5C5C" font-weight="500">Wed</text>

            <rect x="670" y="318" width="140" height="182" fill="#BDB7AC"/>
            <text x="740" y="298">$13</text>
            <text x="740" y="556" fill="#5C5C5C" font-weight="500">Thu</text>

            <rect x="830" y="262" width="140" height="238" fill="#BDB7AC"/>
            <text x="900" y="242">$17</text>
            <text x="900" y="556" fill="#5C5C5C" font-weight="500">Fri</text>

            <rect x="990" y="206" width="140" height="294" fill="#BDB7AC"/>
            <text x="1060" y="186">$21</text>
            <text x="1060" y="556" fill="#5C5C5C" font-weight="500">Sat</text>

            <rect x="1150" y="206" width="140" height="294" fill="#BDB7AC"/>
            <text x="1220" y="186">$21</text>
            <text x="1220" y="556" fill="#5C5C5C" font-weight="500">Sun</text>
          </g>

          <!-- coral bracket on off-peak -->
          <line x1="190" y1="100" x2="650" y2="100" stroke="#DA7756" stroke-width="3"/>
          <line x1="190" y1="92" x2="190" y2="100" stroke="#DA7756" stroke-width="3"/>
          <line x1="650" y1="92" x2="650" y2="100" stroke="#DA7756" stroke-width="3"/>
          <text x="420" y="80" text-anchor="middle" font-size="40" font-weight="700" fill="#B8553A">stated equity band</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Indianapolis Zoo demand-based pricing program (launched 2014); WSJ coverage (2015), zoo annual report.</p>
  </section>
</body>
</html>
