<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 15 &middot; Four approaches on the stick</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .exh .head{ margin-bottom:24px; }
  .exh .head .title{ font-size:80px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; max-width:24ch; }
  .exh .head .title em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .sub{ margin-top:10px; font-size:36px; color:var(--ink-soft); line-height:1.35; max-width:60ch; }
  .exh .head .sub em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:18px; }

  .exh .frame{ background:var(--bg); border:2px solid var(--rule); padding:24px 32px 16px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .exh .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .exh svg{ width:100%; flex:1; min-height:0; display:block; }
  .exh .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The four pricing approaches</h1>
      <p class="sub">Each approach anchors price on a <em>different element</em> of the value stick.</p>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Cost-plus, competitor-match, value-based, dynamic</span>
      <svg viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="A vertical value stick with four arrows pointing to four anchor points. Cost-plus reads near the floor, competitor-match reads a horizontal band in the middle, value-based reads near the willingness-to-pay ceiling in coral, and dynamic reads a moving point near the ceiling.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- value stick centered -->
          <rect x="700" y="500" width="200" height="80" fill="#BDB7AC"/>
          <rect x="700" y="300" width="200" height="200" fill="#E8E6E1"/>
          <rect x="700" y="80"  width="200" height="220" fill="#F4EDE6"/>
          <rect x="700" y="80"  width="200" height="500" fill="none" stroke="#7A7A7A" stroke-width="1.5"/>
          <line x1="700" y1="80"  x2="900" y2="80"  stroke="#DA7756" stroke-width="6"/>

          <text x="800" y="610" text-anchor="middle" font-size="38" font-weight="700">Cost</text>
          <text x="800" y="60"  text-anchor="middle" font-size="38" font-weight="700" fill="#B8553A">WTP ceiling</text>

          <!-- 1. Cost-plus (left, low) -->
          <g font-size="40" font-weight="700">
            <text x="80" y="540">1. Cost-plus</text>
            <text x="80" y="582" font-size="36" font-weight="500" fill="#5C5C5C" font-style="italic">anchors on unit cost</text>
            <line x1="380" y1="530" x2="698" y2="520" stroke="#7A7A7A" stroke-width="2"/>
            <polygon points="698,520 686,514 686,526" fill="#7A7A7A"/>
          </g>

          <!-- 2. Competitor-match (left, middle) -->
          <g font-size="40" font-weight="700">
            <text x="80" y="340">2. Competitor-match</text>
            <text x="80" y="382" font-size="36" font-weight="500" fill="#5C5C5C" font-style="italic">anchors on competitive band</text>
            <line x1="500" y1="330" x2="698" y2="340" stroke="#7A7A7A" stroke-width="2"/>
            <polygon points="698,340 686,334 686,346" fill="#7A7A7A"/>
          </g>

          <!-- 3. Value-based (right, high) — coral -->
          <g font-size="40" font-weight="700" fill="#B8553A">
            <text x="1020" y="160">3. Value-based</text>
            <text x="1020" y="202" font-size="36" font-weight="500" font-style="italic">anchors on WTP</text>
            <line x1="1010" y1="150" x2="902" y2="110" stroke="#DA7756" stroke-width="2.5"/>
            <polygon points="902,110 914,108 910,122" fill="#DA7756"/>
          </g>

          <!-- 4. Dynamic (right, mid-high) -->
          <g font-size="40" font-weight="700">
            <text x="1020" y="300">4. Dynamic</text>
            <text x="1020" y="342" font-size="36" font-weight="500" fill="#5C5C5C" font-style="italic">anchors on time-varying WTP</text>
            <line x1="1010" y1="290" x2="902" y2="220" stroke="#7A7A7A" stroke-width="2"/>
            <polygon points="902,220 914,218 910,232" fill="#7A7A7A"/>
          </g>
        </g>
      </svg>
    </div>

    <p class="source">Source: synthesizes Bertini &amp; Koenigsberg, <em>HBR</em> (2024); Oberholzer-Gee (2021); 2025 IJRM dynamic-pricing consensus.</p>
  </section>
</body>
</html>
