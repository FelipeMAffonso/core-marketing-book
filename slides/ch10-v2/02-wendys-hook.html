<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 02 &middot; Wendy's, February 2024</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .exh .head{ margin-bottom:24px; }
  .exh .head .title{ font-size:84px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; max-width:22ch; }
  .exh .head .title em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:20px; }

  .exh .frame{ background:var(--bg); border:2px solid var(--rule); padding:24px 32px 16px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .exh .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .exh svg{ width:100%; flex:1; min-height:0; display:block; }
  .exh .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Wendy's reversed dynamic pricing in <em>twelve days</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Wendy's stock, February 26 to March 9, 2024</span>
      <svg viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="A timeline of the twelve days from Wendy's dynamic-pricing announcement on Feb 26 through a week of news-cycle backlash to the reversal on March 9. Below, a stock chart shows a roughly six-percent dip and partial recovery over the same period.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">

          <!-- TIMELINE -->
          <line x1="120" y1="120" x2="1480" y2="120" stroke="#7A7A7A" stroke-width="2"/>
          <circle cx="160"  cy="120" r="14" fill="#1a1a1a"/>
          <circle cx="800"  cy="120" r="14" fill="#7A7A7A"/>
          <circle cx="1440" cy="120" r="18" fill="#DA7756"/>

          <g font-size="40" font-weight="700">
            <text x="160"  y="80" text-anchor="middle">Feb 26</text>
            <text x="800"  y="80" text-anchor="middle">Feb 27 to Mar 4</text>
            <text x="1440" y="80" text-anchor="middle" fill="#B8553A">Mar 9</text>
          </g>
          <g font-size="36" fill="#5C5C5C" font-style="italic">
            <text x="160"  y="180" text-anchor="middle">Q4 call: digital</text>
            <text x="160"  y="222" text-anchor="middle">menu boards</text>
            <text x="800"  y="180" text-anchor="middle">news cycle reframes</text>
            <text x="800"  y="222" text-anchor="middle">as surge pricing</text>
            <text x="1440" y="180" text-anchor="middle" fill="#B8553A">company reverses</text>
            <text x="1440" y="222" text-anchor="middle" fill="#B8553A">the announcement</text>
          </g>

          <!-- STOCK CHART below the timeline -->
          <g stroke="#7A7A7A" stroke-width="1.5" fill="none">
            <line x1="120" y1="560" x2="1480" y2="560"/>
            <line x1="120" y1="300" x2="120"  y2="560"/>
          </g>
          <g font-size="36" fill="#7A7A7A">
            <text x="105" y="568" text-anchor="end">base</text>
            <text x="105" y="438" text-anchor="end">&minus;3%</text>
            <text x="105" y="308" text-anchor="end">&minus;6%</text>
          </g>

          <path d="M 160 332 L 280 350 L 400 380 L 520 410 L 640 440 L 760 458 L 800 464 L 920 458 L 1040 446 L 1160 422 L 1280 396 L 1400 360 L 1440 340"
                stroke="#1a1a1a" stroke-width="3.5" fill="none"/>
          <circle cx="160"  cy="332" r="10" fill="#1a1a1a"/>
          <circle cx="800"  cy="464" r="12" fill="#1a1a1a"/>
          <circle cx="1440" cy="340" r="14" fill="#DA7756"/>

          <text x="800" y="510" text-anchor="middle" font-size="36" fill="#5C5C5C" font-style="italic">trough &asymp; &minus;6%</text>

          <line x1="1440" y1="120" x2="1440" y2="560" stroke="#DA7756" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.55"/>
        </g>
      </svg>
    </div>

    <p class="source">Source: Wendy's Q4 2023 earnings call (Feb 26, 2024), company clarification (Mar 9, 2024), stock data via Bloomberg.</p>
  </section>
</body>
</html>
