<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 22b &middot; Part 4 transition</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  /* Visual transition slide — small framework figures preview the Part */
  .slide.bridge{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .bridge .head{ margin-bottom:32px; }
  .bridge .head .title{ font-size:80px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; max-width:24ch; }
  .bridge .head .title em{ font-style:italic; color:var(--accent); font-weight:600; }
  .bridge .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:18px; }

  .bridge .frame{ background:var(--bg); border:2px solid var(--rule); padding:32px 40px 24px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .bridge .frame .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:12px; }
  .bridge svg{ width:100%; flex:1; min-height:0; display:block; }
  .bridge .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide bridge">
    <div class="head">
      <h1 class="title">The menu around a price <em>does work the price itself does not</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Three effects we will name in Part 4</span>
      <svg viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="Three small framework illustrations side by side. Left: decoy effect, three popcorn boxes with the middle one highlighted. Middle: compromise effect, three tier cards with the middle one highlighted. Right: charm pricing, a price label moving from $40 to $39 with the leftmost digit highlighted.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- DECOY -->
          <g transform="translate(80,60)">
            <text x="200" y="-10" text-anchor="middle" font-size="44" font-weight="700">Decoy</text>
            <rect x="0"   y="60" width="100" height="220" fill="#E8E6E1" stroke="#7A7A7A"/>
            <text x="50"  y="120" text-anchor="middle" font-size="36" font-weight="700">S</text>
            <rect x="140" y="30" width="100" height="250" fill="#DA7756"/>
            <text x="190" y="120" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">M</text>
            <rect x="280" y="20" width="100" height="260" fill="#F4EDE6" stroke="#DA7756" stroke-dasharray="4,5"/>
            <text x="330" y="120" text-anchor="middle" font-size="36" font-weight="700" fill="#B8553A">L</text>
            <text x="200" y="340" text-anchor="middle" font-size="36" fill="#5C5C5C" font-style="italic">cinema popcorn</text>
          </g>

          <!-- COMPROMISE -->
          <g transform="translate(620,60)">
            <text x="200" y="-10" text-anchor="middle" font-size="44" font-weight="700">Compromise</text>
            <rect x="0"   y="150" width="100" height="130" fill="#E8E6E1" stroke="#7A7A7A"/>
            <text x="50"  y="220" text-anchor="middle" font-size="36" font-weight="700">basic</text>
            <rect x="140" y="80"  width="100" height="200" fill="#DA7756"/>
            <text x="190" y="180" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">middle</text>
            <rect x="280" y="40"  width="100" height="240" fill="#BDB7AC" stroke="#7A7A7A"/>
            <text x="330" y="160" text-anchor="middle" font-size="36" font-weight="700">premium</text>
            <text x="200" y="340" text-anchor="middle" font-size="36" fill="#5C5C5C" font-style="italic">three tiers</text>
          </g>

          <!-- CHARM -->
          <g transform="translate(1160,60)">
            <text x="200" y="-10" text-anchor="middle" font-size="44" font-weight="700">Charm</text>
            <text x="60"  y="170" text-anchor="middle" font-size="80" font-weight="300" fill="#7A7A7A" text-decoration="line-through">$40</text>
            <text x="200" y="190" text-anchor="middle" font-size="40" fill="#7A7A7A">&rarr;</text>
            <text x="340" y="170" text-anchor="middle" font-size="90" font-weight="700"><tspan fill="#B8553A">$3</tspan><tspan>9</tspan></text>
            <text x="200" y="340" text-anchor="middle" font-size="36" fill="#5C5C5C" font-style="italic">leftmost digit drops</text>
          </g>
        </g>
      </svg>
    </div>
  </section>
</body>
</html>
