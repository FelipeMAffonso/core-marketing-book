<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 03 &middot; The value stick</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; padding:72px 96px 100px; }
  .exh .head{ margin-bottom:24px; }
  .exh .head .title{ font-size:80px; font-weight:700; line-height:1.05; color:var(--ink); letter-spacing:-0.018em; max-width:22ch; }
  .exh .head .title em{ font-style:italic; color:var(--accent); font-weight:600; }
  .exh .head .rule{ width:120px; height:4px; background:var(--accent); margin-top:18px; }

  .exh .frame{ background:var(--bg); border:2px solid var(--rule); padding:24px 32px 16px; display:flex; flex-direction:column; flex:1; min-height:0; max-height:100%; overflow:hidden; }
  .exh .caption{ font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .exh svg{ width:100%; flex:1; min-height:0; display:block; }
  .exh .source{ position:absolute; right:80px; bottom:28px; font-size:22px; color:var(--source); }
</style>
</head>
<body>
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The <em>value stick</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Section 10.2 &middot; the unifying diagram for the four pricing approaches</span>
      <svg viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="A vertical value stick. Cost sets the floor at the bottom; the firm's margin runs up to the posted price; consumer surplus runs above the price up to the willingness-to-pay ceiling at the top.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- stick: cost block, margin block, surplus block -->
          <rect x="650" y="480" width="280" height="100" fill="#BDB7AC"/>
          <rect x="650" y="280" width="280" height="200" fill="#E8E6E1"/>
          <rect x="650" y="80"  width="280" height="200" fill="#F4EDE6"/>
          <rect x="650" y="80"  width="280" height="500" fill="none" stroke="#7A7A7A" stroke-width="1.5"/>

          <line x1="600" y1="580" x2="1010" y2="580" stroke="#7A7A7A" stroke-width="2"/>
          <line x1="600" y1="480" x2="1010" y2="480" stroke="#7A7A7A" stroke-width="2"/>
          <line x1="600" y1="280" x2="1050" y2="280" stroke="#7A7A7A" stroke-width="3"/>
          <line x1="600" y1="80"  x2="1050" y2="80"  stroke="#DA7756" stroke-width="6"/>

          <g font-size="40" font-weight="700" text-anchor="end">
            <text x="580" y="540">Cost</text>
            <text x="580" y="390">Margin</text>
            <text x="580" y="190">Consumer surplus</text>
          </g>

          <text x="1070" y="290" font-size="40" font-weight="700">Price</text>
          <text x="1070" y="90"  font-size="40" font-weight="700" fill="#B8553A">Willingness to pay</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Oberholzer-Gee, <em>Better, Simpler Strategy</em> (HBS Press, 2021).</p>
  </section>
</body>
</html>
