<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing &middot; 01 &middot; Cover</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.cover{
    display:flex; flex-direction:column; justify-content:space-between;
    padding:112px 128px;
    border-top:8px solid var(--accent);
  }
  .cover .ch-num{
    font-size:26px; font-weight:700; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--ink-mute);
  }
  .cover .stack{
    display:flex; flex-direction:column; justify-content:center;
    flex:1; padding-top:48px;
  }
  .cover .display{
    font-size:256px; font-weight:700; line-height:0.96;
    color:var(--ink); letter-spacing:-0.04em;
  }
  .cover .display em{ font-style:italic; font-weight:500; color:var(--accent); }
  .cover .sub{
    margin-top:56px; max-width:38ch;
    font-size:44px; line-height:1.5; color:var(--ink-soft);
  }
  .cover .foot-rule{
    padding-top:36px; border-top:1px solid var(--rule);
    height:36px;
  }
</style>
</head>
<body>
  <section class="slide cover">
    <span class="ch-num">Chapter 10</span>
    <div class="stack">
      <h1 class="display">Pricing</h1>
      <p class="sub">
        The marketing-mix decision that <em>captures the value</em> created by the firm's other decisions,
        and the only one a firm can adjust without changing what it makes or how it delivers.
      </p>
    </div>
    <div class="foot-rule"></div>
  </section>
</body>
</html>
