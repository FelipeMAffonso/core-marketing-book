<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 12 Retail · 08 · The wheel of retailing</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:10px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:12px 22px 10px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:2px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 08 · EXHIBIT (lifted from chapter fig-3) · the wheel of retailing. ONE coral element = the turning ring; four stage nodes in ink. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">A format enters cheap, trades up, grows vulnerable, and declines. <em>The wheel keeps turning.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 12.4 · The wheel of retailing · McNair (1957), Hollander (1960) four-stage refinement</span>
      <svg viewBox="0 0 720 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The wheel of retailing as a four-stage cycle drawn around a single coral dashed ring. Innovation at top with Aldi 1976 and TikTok Shop 2023, trade-up at right with Walmart 1990s, vulnerability at bottom with department stores 2000s, and decline at left with Macy's 150 closures in 2024. Coral arrows on the ring show the direction of the turn.">
        <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#555">
          <!-- the ONE coral element: the turning ring -->
          <circle cx="360" cy="180" r="120" fill="none" stroke="#DA7756" stroke-width="2" stroke-dasharray="6,5"/>
          <!-- direction arrows on the ring (coral, part of the same element) -->
          <polygon points="476,150 492,146 484,162" fill="#DA7756"/>
          <polygon points="372,300 356,304 364,288" fill="#DA7756"/>
          <polygon points="244,210 228,214 236,198" fill="#DA7756"/>
          <polygon points="348,60 364,56 356,72" fill="#DA7756"/>

          <!-- stage nodes in ink -->
          <circle cx="360" cy="60"  r="10" fill="#1a1a1a"/>
          <circle cx="480" cy="180" r="10" fill="#1a1a1a"/>
          <circle cx="360" cy="300" r="10" fill="#1a1a1a"/>
          <circle cx="240" cy="180" r="10" fill="#1a1a1a"/>

          <!-- stage labels -->
          <g fill="#1a1a1a">
            <text x="360" y="34" text-anchor="middle" font-weight="700" font-size="13">01 INNOVATION</text>
            <text x="360" y="86" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">Aldi 1976, TikTok Shop 2023</text>

            <text x="505" y="166" text-anchor="start" font-weight="700" font-size="13">02 TRADE-UP</text>
            <text x="505" y="184" text-anchor="start" fill="#555" font-size="11">facilities, depth</text>
            <text x="505" y="202" text-anchor="start" fill="#7A7A7A" font-size="10.5" font-style="italic">Walmart 1990s</text>

            <text x="360" y="332" text-anchor="middle" font-weight="700" font-size="13">03 VULNERABILITY</text>
            <text x="360" y="350" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">department stores 2000s</text>

            <text x="215" y="166" text-anchor="end" font-weight="700" font-size="13">04 DECLINE</text>
            <text x="215" y="184" text-anchor="end" fill="#555" font-size="11">next entrant takes over</text>
            <text x="215" y="202" text-anchor="end" fill="#7A7A7A" font-size="10.5" font-style="italic">Macy's: 150 closures 2024</text>
          </g>

          <!-- center caption -->
          <text x="360" y="176" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">the pattern is a default,</text>
          <text x="360" y="194" text-anchor="middle" fill="#7A7A7A" font-size="11" font-style="italic">not a law</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: McNair (1957); Hollander, "The Wheel of Retailing," <em>J. of Marketing</em> 25(1), 1960; Macy's Inc. (Feb. 2024)</p>
  </section>
</body>
</html>
