<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 12 Retail · 12 · Five named layouts</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:10px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:12px 22px 10px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:2px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 12 · EXHIBIT (lifted from chapter sk-layout-types; reveal/hand stripped, redrawn static) · the five canonical store layouts. ONE coral element = the traffic paths + entries drawn in coral across all five; floor boxes in ink/gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Five named layouts arrange the same geometry. <em>Each routes the shopper a different way.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 12.6 · The five canonical store layouts · grid, diagonal, racetrack, spine, free-flow</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Five floor schematics in a row. The grid runs parallel aisles for a supermarket. The diagonal angles aisles toward the back for a convenience store. The racetrack lays one loop past every department for IKEA. The spine runs a central aisle with departments branching off for a department store. Free-flow scatters fixtures for a boutique or Apple Store. The traffic paths and entry marks are drawn in coral; the floor outlines are gray.">
        <g font-family="'Segoe UI', sans-serif">
          <!-- five cells, box top 40, w 124, h 150, gap to land centers at 78,210,342,474,606 -->
          <!-- GRID -->
          <rect x="16"  y="40" width="124" height="150" fill="#fcfaf6" stroke="#A39E94" stroke-width="1.2"/>
          <g stroke="#DA7756" stroke-width="2">
            <line x1="44"  y1="58" x2="44"  y2="158"/>
            <line x1="68"  y1="58" x2="68"  y2="158"/>
            <line x1="92"  y1="58" x2="92"  y2="158"/>
            <line x1="116" y1="58" x2="116" y2="158"/>
          </g>
          <rect x="22" y="176" width="22" height="9" fill="#DA7756"/>
          <text x="78"  y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">GRID</text>
          <text x="78"  y="226" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">supermarket</text>

          <!-- DIAGONAL -->
          <rect x="148" y="40" width="124" height="150" fill="#fcfaf6" stroke="#A39E94" stroke-width="1.2"/>
          <g stroke="#DA7756" stroke-width="2">
            <line x1="160" y1="158" x2="190" y2="58"/>
            <line x1="186" y1="158" x2="216" y2="58"/>
            <line x1="212" y1="158" x2="242" y2="58"/>
            <line x1="238" y1="158" x2="262" y2="58"/>
          </g>
          <rect x="154" y="176" width="22" height="9" fill="#DA7756"/>
          <text x="210" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">DIAGONAL</text>
          <text x="210" y="226" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">convenience</text>

          <!-- RACETRACK -->
          <rect x="280" y="40" width="124" height="150" fill="#fcfaf6" stroke="#A39E94" stroke-width="1.2"/>
          <rect x="298" y="58" width="88" height="98" fill="none" stroke="#DA7756" stroke-width="2.4"/>
          <polygon points="298,80 293,71 303,71" fill="#DA7756"/>
          <rect x="286" y="176" width="22" height="9" fill="#DA7756"/>
          <text x="342" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">RACETRACK</text>
          <text x="342" y="226" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">IKEA</text>

          <!-- SPINE -->
          <rect x="412" y="40" width="124" height="150" fill="#fcfaf6" stroke="#A39E94" stroke-width="1.2"/>
          <g stroke="#DA7756" stroke-width="2">
            <line x1="474" y1="158" x2="474" y2="58"/>
            <line x1="474" y1="76"  x2="424" y2="76"/>
            <line x1="474" y1="76"  x2="524" y2="76"/>
            <line x1="474" y1="106" x2="424" y2="106"/>
            <line x1="474" y1="106" x2="524" y2="106"/>
            <line x1="474" y1="136" x2="424" y2="136"/>
            <line x1="474" y1="136" x2="524" y2="136"/>
          </g>
          <rect x="418" y="176" width="22" height="9" fill="#DA7756"/>
          <text x="474" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">SPINE</text>
          <text x="474" y="226" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">department</text>

          <!-- FREE-FLOW -->
          <rect x="544" y="40" width="124" height="150" fill="#fcfaf6" stroke="#A39E94" stroke-width="1.2"/>
          <g fill="#fff7f0" stroke="#DA7756" stroke-width="1.6">
            <circle cx="572" cy="66"  r="12"/>
            <circle cx="640" cy="74"  r="12"/>
            <circle cx="584" cy="150" r="12"/>
            <circle cx="640" cy="156" r="12"/>
            <circle cx="606" cy="112" r="12"/>
          </g>
          <rect x="550" y="176" width="22" height="9" fill="#DA7756"/>
          <text x="606" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">FREE-FLOW</text>
          <text x="606" y="226" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">boutique / Apple</text>

          <!-- caption row -->
          <text x="360" y="262" text-anchor="middle" font-size="11.5" fill="#1a1a1a">A grid speeds the stock-up trip; a racetrack captures the impulse exposure a grid leaves on the floor.</text>
          <text x="360" y="280" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">Most real stores combine two: a free-flow front feeding a grid grocery section behind it.</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Stukent, retail layout taxonomy; Levy, Weitz &amp; Grewal, <em>Retailing Management</em> 11e (2022)</p>
  </section>
</body>
</html>
