<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 12 Retail · 07 · The format map</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:10px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:12px 22px 10px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:2px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 07 · EXHIBIT (lifted from chapter fig-2) · format two-by-two. ONE coral element = the diagonal where disruption happens; all format dots are ink/gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Ten formats sort on assortment width by price level. <em>The disruption runs along the diagonal.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 12.3 · Retail formats · assortment width by price level</span>
      <svg viewBox="0 0 720 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A two-by-two of retail formats plotting assortment width on the horizontal axis against price level on the vertical. Formats are plotted as gray dots: Apple Store and Tiffany narrow-high, Sephora and Patagonia narrow-mid, Bloomingdale's and Macy's and Nordstrom broad-high, Trader Joe's and Aldi and Lidl narrow-low, Costco and Walmart and Target and Kroger broad-low. A single coral diagonal arrow crosses the plane to mark where most strategic disruption happens.">
        <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#555">
          <!-- quadrant frame -->
          <line x1="80" y1="40" x2="80" y2="320" stroke="#1a1a1a" stroke-width="1.4"/>
          <line x1="80" y1="320" x2="680" y2="320" stroke="#1a1a1a" stroke-width="1.4"/>
          <line x1="80" y1="180" x2="680" y2="180" stroke="#A39E94" stroke-width="1" stroke-dasharray="4,3"/>
          <line x1="380" y1="40" x2="380" y2="320" stroke="#A39E94" stroke-width="1" stroke-dasharray="4,3"/>
          <!-- axis labels -->
          <text x="380" y="346" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">assortment width &rarr;</text>
          <text x="100" y="338" text-anchor="middle" fill="#888" font-size="10">narrow</text>
          <text x="660" y="338" text-anchor="end" fill="#888" font-size="10">broad</text>
          <text x="40" y="180" text-anchor="middle" transform="rotate(-90 40 180)" fill="#1a1a1a" font-size="12" font-weight="600">price level &rarr;</text>
          <text x="64" y="56" text-anchor="end" fill="#888" font-size="10">high</text>
          <text x="64" y="318" text-anchor="end" fill="#888" font-size="10">low</text>
          <!-- quadrant captions -->
          <text x="230" y="56" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">specialty / luxury</text>
          <text x="530" y="56" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">department / premium</text>
          <text x="230" y="310" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">hard-discount</text>
          <text x="530" y="310" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">mass / warehouse</text>

          <!-- the ONE coral element: the disruption diagonal, corner to corner -->
          <line x1="170" y1="100" x2="600" y2="290" stroke="#DA7756" stroke-width="2.4" stroke-dasharray="7,4"/>
          <polygon points="600,290 585,280 588,294" fill="#DA7756"/>
          <rect x="300" y="186" width="186" height="20" fill="#FDF6F3" stroke="#DA7756" stroke-width="1"/>
          <text x="393" y="200" text-anchor="middle" fill="#B8553A" font-size="11.5" font-weight="700">where disruption happens</text>

          <!-- format dots: all ink/gray (no second accent) -->
          <g font-size="11.5" fill="#1a1a1a">
            <circle cx="180" cy="90"  r="5" fill="#555"/><text x="190" y="94">Apple Store</text>
            <circle cx="220" cy="120" r="5" fill="#555"/><text x="230" y="124">Tiffany</text>
            <circle cx="255" cy="150" r="5" fill="#555"/><text x="265" y="154">Sephora</text>
            <circle cx="175" cy="165" r="5" fill="#555"/><text x="185" y="169">Patagonia</text>
            <circle cx="490" cy="86"  r="5" fill="#555"/><text x="500" y="90">Bloomingdale's</text>
            <circle cx="540" cy="120" r="5" fill="#555"/><text x="550" y="124">Macy's</text>
            <circle cx="610" cy="150" r="5" fill="#555"/><text x="600" y="154" text-anchor="end">Nordstrom</text>
            <circle cx="180" cy="248" r="5" fill="#555"/><text x="190" y="252">Trader Joe's</text>
            <circle cx="200" cy="282" r="5" fill="#555"/><text x="210" y="286">Aldi</text>
            <circle cx="160" cy="300" r="5" fill="#555"/><text x="170" y="304">Lidl</text>
            <circle cx="500" cy="284" r="5" fill="#555"/><text x="510" y="288">Costco</text>
            <circle cx="545" cy="302" r="5" fill="#555"/><text x="555" y="306">Walmart</text>
            <circle cx="615" cy="288" r="5" fill="#555"/><text x="605" y="292" text-anchor="end">Target</text>
            <circle cx="450" cy="250" r="5" fill="#555"/><text x="460" y="254">Kroger</text>
          </g>
        </g>
      </svg>
    </div>

    <p class="source">Source: Kotler, Keller &amp; Chernev, <em>Marketing Management</em> 16e (2022), Ch. 16, ten major retail formats</p>
  </section>
</body>
</html>
