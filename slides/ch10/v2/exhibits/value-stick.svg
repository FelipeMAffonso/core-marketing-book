<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The value stick: cost floor, margin, price, consumer surplus, willingness-to-pay ceiling. The willingness-to-pay ceiling is drawn in coral, the boundary the chapter reads toward.">
  <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
    <rect x="210" y="266" width="120" height="36" fill="#BDB7AC"/>
    <rect x="210" y="160" width="120" height="106" fill="#E8E6E1"/>
    <rect x="210" y="60" width="120" height="100" fill="#F4EDE6"/>
    <rect x="210" y="60" width="120" height="242" fill="none" stroke="#7A7A7A" stroke-width="0.8"/>

    <line x1="170" y1="302" x2="370" y2="302" stroke="#7A7A7A" stroke-width="1"/>
    <line x1="170" y1="266" x2="370" y2="266" stroke="#7A7A7A" stroke-width="1"/>
    <line x1="170" y1="160" x2="390" y2="160" stroke="#7A7A7A" stroke-width="1.4"/>
    <line x1="170" y1="60"  x2="390" y2="60"  stroke="#DA7756" stroke-width="3"/>

    <text x="160" y="288" text-anchor="end" font-size="13" font-weight="600">Cost</text>
    <text x="160" y="304" text-anchor="end" font-size="11" fill="#7A7A7A" font-style="italic">the floor</text>

    <text x="160" y="208" text-anchor="end" font-size="13" font-weight="600">Margin</text>
    <text x="160" y="224" text-anchor="end" font-size="11" fill="#7A7A7A" font-style="italic">firm keeps</text>

    <text x="160" y="106" text-anchor="end" font-size="13" font-weight="600">Consumer surplus</text>
    <text x="160" y="122" text-anchor="end" font-size="11" fill="#7A7A7A" font-style="italic">buyer keeps</text>

    <text x="400" y="164" font-size="13" font-weight="700">Price</text>
    <text x="400" y="180" font-size="11" fill="#7A7A7A" font-style="italic">the posted number</text>

    <text x="400" y="56" font-size="13" font-weight="700" fill="#B8553A">Willingness to pay</text>
    <text x="400" y="72" font-size="11" fill="#B8553A" font-style="italic">the ceiling, the most a buyer would give up</text>

    <text x="478" y="232" font-size="11.5" font-weight="600" fill="#5C5C5C">Cost-based reads the floor</text>
    <text x="478" y="252" font-size="11.5" font-weight="600" fill="#5C5C5C">Competitor-based reads the frame</text>
    <text x="478" y="110" font-size="11.5" font-weight="700" fill="#B8553A">Value-based reads the ceiling</text>
    <line x1="474" y1="106" x2="394" y2="64" stroke="#DA7756" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
</svg>
