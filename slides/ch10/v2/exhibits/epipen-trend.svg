<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="EpiPen two-pack wholesale price climbed from about 100 dollars in 2007 to 608 dollars in 2016 through fifteen small steps that drew no individual reaction. The 2016 Senate hearing where the cumulative line broke is the load-bearing event, shown in coral.">
  <g font-size="11" fill="#1a1a1a">
    <line x1="60" y1="230" x2="624" y2="230" stroke="#7A7A7A"/>
    <line x1="60" y1="30" x2="60" y2="230" stroke="#E8E6E1"/>
    <g font-size="11" fill="#7A7A7A" text-anchor="end">
      <text x="52" y="234">$0</text>
      <text x="52" y="180">$200</text>
      <text x="52" y="130">$400</text>
      <text x="52" y="80">$600</text>
    </g>
    <text x="24" y="130" font-size="11" fill="#7A7A7A" text-anchor="middle" font-style="italic" transform="rotate(-90 24 130)">two-pack price</text>

    <g font-size="10" fill="#7A7A7A" text-anchor="middle">
      <text x="60"  y="252">2007</text>
      <text x="200" y="252">2010</text>
      <text x="340" y="252">2013</text>
      <text x="480" y="252">2016</text>
      <text x="600" y="252">2018</text>
    </g>

    <polyline points="60,205 130,196 200,176 270,154 340,128 410,108 480,82 540,82 600,128"
              fill="none" stroke="#1a1a1a" stroke-width="2"/>

    <circle cx="60"  cy="205" r="3" fill="#1a1a1a"/>
    <circle cx="200" cy="176" r="3" fill="#1a1a1a"/>
    <circle cx="340" cy="128" r="3" fill="#1a1a1a"/>
    <circle cx="480" cy="82"  r="6" fill="#DA7756"/>

    <text x="60"  y="195" font-size="11" font-weight="600">$100</text>
    <text x="490" y="72" font-size="13" fill="#DA7756" font-weight="700">$608</text>

    <line x1="480" y1="34" x2="480" y2="78" stroke="#DA7756" stroke-width="1.2" stroke-dasharray="3,3"/>
    <text x="480" y="26" text-anchor="middle" font-size="11" fill="#DA7756" font-weight="700">2016 Senate hearing</text>
    <text x="480" y="-2" text-anchor="middle" font-size="10" fill="#888">the cumulative line breaks</text>

    <text x="320" y="276" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">fifteen small steps, each below the just-noticeable difference, until the cumulative climb became publicly visible</text>
  </g>
</svg>
