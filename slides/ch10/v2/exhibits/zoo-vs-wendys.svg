<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Side-by-side outcomes. The Indianapolis Zoo published a calendar from an 8 dollar Tuesday floor to a 30 dollar Saturday peak; weekday attendance moved from 57 to 67 percent and revenue rose 12 percent. Wendy's announced a peak surcharge with no off-peak cut, reversed within twelve days, and dropped 6.4 percent in stock price.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="60" y="40" width="270" height="220" fill="#FDF6F3" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="195" y="66" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="0.6" fill="#B8553A">INDIANAPOLIS ZOO</text>
    <text x="195" y="84" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">held</text>

    <text x="80" y="118" font-size="12" fill="#1a1a1a">Off-peak floor lowered to $8</text>
    <text x="80" y="142" font-size="12" fill="#1a1a1a">Calendar published in advance</text>
    <text x="80" y="166" font-size="12" fill="#1a1a1a">Same single price $16.95 was the prior baseline</text>

    <text x="80" y="206" font-size="11" font-weight="600" fill="#B8553A">WEEKDAY 57% to 67%</text>
    <text x="80" y="224" font-size="11" font-weight="600" fill="#B8553A">REVENUE +12%</text>
    <text x="80" y="242" font-size="11" font-style="italic" fill="#5C5C5C">access widened for budget families</text>

    <rect x="350" y="40" width="270" height="220" fill="#FFFFFF" stroke="#BDB7AC" stroke-width="1.6" rx="2"/>
    <text x="485" y="66" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="0.6" fill="#5C5C5C">WENDY'S</text>
    <text x="485" y="84" text-anchor="middle" font-size="11" font-style="italic" fill="#7A7A7A">reversed in 12 days</text>

    <text x="370" y="118" font-size="12" fill="#1a1a1a">Peak surcharge only, no off-peak cut</text>
    <text x="370" y="142" font-size="12" fill="#1a1a1a">Earnings call language led the story</text>
    <text x="370" y="166" font-size="12" fill="#1a1a1a">Staple food, tight reference price, captive lunch crowd</text>

    <text x="370" y="206" font-size="11" font-weight="600" fill="#5C5C5C">REVERSED IN 12 DAYS</text>
    <text x="370" y="224" font-size="11" font-weight="600" fill="#5C5C5C">STOCK -6.4%</text>
    <text x="370" y="242" font-size="11" font-style="italic" fill="#7A7A7A">fairness ceiling triggered</text>

    <text x="330" y="288" text-anchor="middle" font-size="12" font-style="italic" fill="#7A7A7A">Same mechanism. Different fairness ceiling. Set by whether the off-peak was real.</text>
  </g>
</svg>
