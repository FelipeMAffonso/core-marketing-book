<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Van Westendorp price-sensitivity meter. Four cumulative curves cross to bound an acceptable price range. The acceptable range and optimal price are highlighted in coral.">
  <defs>
    <linearGradient id="psm-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <g font-size="11" fill="#5C5C5C">
    <line x1="64" y1="262" x2="612" y2="262" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="64" y1="30"  x2="64"  y2="262" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="338" y="298" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">price ($)</text>
    <text x="28" y="146" text-anchor="middle" transform="rotate(-90 28 146)" fill="#1a1a1a" font-size="12" font-weight="600">cumulative %</text>
    <g fill="#888" font-size="10">
      <text x="64"  y="278" text-anchor="middle">$1</text>
      <text x="201" y="278" text-anchor="middle">$2</text>
      <text x="338" y="278" text-anchor="middle">$3</text>
      <text x="475" y="278" text-anchor="middle">$4</text>
      <text x="612" y="278" text-anchor="middle">$5</text>
    </g>

    <rect x="265" y="30" width="146" height="232" fill="url(#psm-fill)"/>
    <text x="338" y="48" text-anchor="middle" fill="#B8553A" font-size="11" font-weight="700">ACCEPTABLE RANGE</text>
    <line x1="338" y1="30" x2="338" y2="262" stroke="#B8553A" stroke-width="1.4" stroke-dasharray="5,4"/>

    <path d="M 64 262 Q 200 232 270 170 Q 360 110 480 70 Q 560 50 612 30" fill="none" stroke="#B8553A" stroke-width="2"/>
    <text x="592" y="42" fill="#B8553A" font-size="11" font-weight="600" text-anchor="end">too expensive</text>

    <path d="M 64 30 Q 200 70 270 120 Q 360 180 480 230 Q 560 252 612 262" fill="none" stroke="#DA7756" stroke-width="2"/>
    <text x="86" y="50" fill="#DA7756" font-size="11" font-weight="600">too cheap</text>

    <path d="M 64 262 Q 180 242 256 210 Q 340 168 432 110 Q 528 68 612 50" fill="none" stroke="#B8553A" stroke-width="1.6" stroke-dasharray="5,4" opacity="0.55"/>
    <text x="500" y="118" fill="#B8553A" font-size="11" font-weight="600" opacity="0.75">getting expensive</text>

    <path d="M 64 52 Q 180 88 256 134 Q 340 192 432 240 Q 528 256 612 262" fill="none" stroke="#DA7756" stroke-width="1.6" stroke-dasharray="5,4" opacity="0.55"/>
    <text x="220" y="118" fill="#DA7756" font-size="11" font-weight="600" opacity="0.75">bargain</text>

    <circle cx="338" cy="166" r="6" fill="#DA7756"/>
    <text x="338" y="156" text-anchor="middle" fill="#B8553A" font-size="11" font-weight="700">OPP $3.00</text>

    <circle cx="265" cy="220" r="4" fill="#1a1a1a"/>
    <text x="240" y="234" text-anchor="end" fill="#1a1a1a" font-size="10" font-weight="600">PMC $2.00</text>

    <circle cx="411" cy="124" r="4" fill="#1a1a1a"/>
    <text x="438" y="118" fill="#1a1a1a" font-size="10" font-weight="600">PME $3.50</text>
  </g>
</svg>
