<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The same $30 added to a $60 cost reads as a 50 percent markup against cost, but only a 33 percent margin against the $90 selling price. Markup uses cost as the base; margin uses price.">
  <g font-size="12" fill="#1a1a1a">
    <text x="150" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#5C5C5C" letter-spacing="0.6">MARKUP (on $60 cost)</text>
    <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#B8553A" letter-spacing="0.6">MARGIN (on $90 price)</text>

    <rect x="60" y="60"  width="180" height="40" fill="#BDB7AC"/>
    <text x="150" y="86" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">$60 cost</text>
    <rect x="60" y="100" width="90"  height="40" fill="#D8D2C7"/>
    <text x="105" y="126" text-anchor="middle" font-size="13" fill="#5C5C5C" font-weight="600">+$30</text>
    <text x="280" y="126" font-size="36" fill="#5C5C5C" font-weight="700">50%</text>

    <line x1="60" y1="158" x2="240" y2="158" stroke="#7A7A7A"/>
    <text x="150" y="178" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">base = cost ($60)</text>

    <rect x="360" y="60"  width="180" height="40" fill="#BDB7AC"/>
    <text x="450" y="86"  text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">$60 cost</text>
    <rect x="360" y="100" width="90"  height="40" fill="#DA7756"/>
    <text x="405" y="126" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="600">+$30</text>
    <text x="478" y="126" font-size="36" fill="#DA7756" font-weight="700">33%</text>

    <line x1="360" y1="158" x2="540" y2="158" stroke="#B8553A"/>
    <text x="450" y="178" text-anchor="middle" font-size="11" fill="#B8553A" font-style="italic">base = price ($90)</text>

    <text x="300" y="220" text-anchor="middle" font-size="13" font-weight="600">Same $30 added, two different percentages.</text>
    <text x="300" y="244" text-anchor="middle" font-size="11" font-style="italic" fill="#7A7A7A">markup can pass 100% because cost is the smaller base; margin never can.</text>
  </g>
</svg>
