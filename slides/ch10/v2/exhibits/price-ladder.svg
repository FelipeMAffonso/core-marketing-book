<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Four pricing approaches as a price ladder: cost is the floor, competitor the frame, value the ceiling, with the typical sequence running cost to competitor to value; customer-determined is a separate buyer-set mode.">
  <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
    <rect x="120" y="40"  width="320" height="60" rx="2" fill="#FDF6F3" stroke="#DA7756" stroke-width="1.6"/>
    <text x="138" y="68"  font-weight="700" font-size="13" letter-spacing="0.6" fill="#B8553A">VALUE-BASED</text>
    <text x="422" y="68"  text-anchor="end" font-size="11" font-style="italic" fill="#B8553A">the ceiling</text>
    <text x="138" y="86"  font-size="12">the most a buyer will pay (EVC)</text>

    <rect x="120" y="120" width="320" height="60" rx="2" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6"/>
    <text x="138" y="148" font-weight="700" font-size="13" letter-spacing="0.6" fill="#B8553A">COMPETITOR-BASED</text>
    <text x="422" y="148" text-anchor="end" font-size="11" font-style="italic" fill="#B8553A">the frame</text>
    <text x="138" y="166" font-size="12">match or beat the rival</text>

    <rect x="120" y="200" width="320" height="60" rx="2" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6"/>
    <text x="138" y="228" font-weight="700" font-size="13" letter-spacing="0.6" fill="#B8553A">COST-BASED</text>
    <text x="422" y="228" text-anchor="end" font-size="11" font-style="italic" fill="#B8553A">the floor</text>
    <text x="138" y="246" font-size="12">unit cost plus a markup</text>

    <line x1="90" y1="250" x2="90" y2="58" stroke="#DA7756" stroke-width="2.4" stroke-linecap="round"/>
    <polygon points="90,48 84,62 96,62" fill="#DA7756"/>
    <text x="72" y="156" text-anchor="middle" transform="rotate(-90 72 156)" font-size="12" fill="#B8553A" font-weight="600">typical sequence</text>

    <rect x="470" y="120" width="180" height="60" rx="2" fill="none" stroke="#DA7756" stroke-width="1.4" stroke-dasharray="5,4"/>
    <text x="560" y="146" text-anchor="middle" font-weight="700" font-size="11" letter-spacing="0.4" fill="#B8553A">CUSTOMER-DETERMINED</text>
    <text x="560" y="164" text-anchor="middle" font-size="11">the buyer names the price</text>

    <text x="560" y="108" text-anchor="middle" font-size="11" fill="#888" font-style="italic">a different logic</text>

    <text x="340" y="298" text-anchor="middle" font-size="12" fill="#1a1a1a" font-style="italic">cost-plus reads the floor, competitor-match reads the frame, value-based reads the ceiling</text>
  </g>
</svg>
