<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Three brand anchors on the pricing compass. Costco caps markup at 14 percent; membership carries about 70 percent of profit. Patagonia defends a $279 Down Sweater with durability, repair, and 1 percent for the Planet. Liquid Death sells a $2.49 can of water on identity at 5 to 8 times the per-ounce commodity rate.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="40"  y="40" width="200" height="220" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="140" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">COSTCO</text>
    <text x="140" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">competitor-based</text>
    <line x1="60" y1="100" x2="220" y2="100" stroke="#E8E6E1"/>
    <text x="140" y="124" text-anchor="middle" font-size="13" font-weight="700">14% markup cap</text>
    <text x="60" y="156" font-size="12">$4.99 rotisserie</text>
    <text x="60" y="178" font-size="12">$1.50 hot-dog combo</text>
    <text x="60" y="200" font-size="12">Held since 2009 / 1985</text>
    <text x="140" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">~70% of profit from</text>
    <text x="140" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">membership fee</text>

    <rect x="260" y="40" width="200" height="220" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="360" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">PATAGONIA</text>
    <text x="360" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">value-based, purpose</text>
    <line x1="280" y1="100" x2="440" y2="100" stroke="#E8E6E1"/>
    <text x="360" y="124" text-anchor="middle" font-size="13" font-weight="700">$279 Down Sweater</text>
    <text x="280" y="156" font-size="12">2x mass-market band</text>
    <text x="280" y="178" font-size="12">Lifetime repair guarantee</text>
    <text x="280" y="200" font-size="12">1% for the Planet</text>
    <text x="360" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">"Don't Buy This Jacket"</text>
    <text x="360" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">+30% revenue next year</text>

    <rect x="480" y="40" width="200" height="220" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="580" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">LIQUID DEATH</text>
    <text x="580" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">value-based, identity</text>
    <line x1="500" y1="100" x2="660" y2="100" stroke="#E8E6E1"/>
    <text x="580" y="124" text-anchor="middle" font-size="13" font-weight="700">$2.49 per 16oz can</text>
    <text x="500" y="156" font-size="12">5-8x commodity water</text>
    <text x="500" y="178" font-size="12">Aluminum tallboy</text>
    <text x="500" y="200" font-size="12">Heavy-metal aesthetic</text>
    <text x="580" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">$1.4B valuation 2024</text>
    <text x="580" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">&lt;$0.30 input cost</text>

    <text x="360" y="286" text-anchor="middle" font-size="12" font-style="italic" fill="#7A7A7A">Three brands, three anchors, one structural commitment each.</text>
  </g>
</svg>
