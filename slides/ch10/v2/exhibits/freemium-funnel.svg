<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 260" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Freemium funnel: free signups, trial, paid users. The paid conversion sliver is where the model funds itself, not the headline price.">
  <g font-size="11" fill="#1a1a1a">
    <polygon points="60,40 600,40 540,90 120,90" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1"/>
    <text x="330" y="65" text-anchor="middle" font-size="13" font-weight="600">FREE SIGNUPS</text>
    <text x="330" y="82" text-anchor="middle" font-size="11" fill="#5C5C5C">acquire users at near-zero marginal cost</text>

    <polygon points="120,98 540,98 480,148 180,148" fill="#D8D2C7" stroke="#7A7A7A" stroke-width="1"/>
    <text x="330" y="123" text-anchor="middle" font-size="13" font-weight="600">FREE TO TRIAL</text>
    <text x="330" y="140" text-anchor="middle" font-size="11" fill="#5C5C5C">12% activate the paid features</text>

    <polygon points="180,156 480,156 420,206 240,206" fill="#DA7756" stroke="#B8553A" stroke-width="1"/>
    <text x="330" y="181" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="700">TRIAL TO PAID</text>
    <text x="330" y="198" text-anchor="middle" font-size="11" fill="#FDF6F3">25% convert. This is where the model lives.</text>

    <text x="330" y="240" text-anchor="middle" font-size="11" font-style="italic" fill="#7A7A7A">conversion x LTV vs CAC decides whether the model funds itself, not the posted price</text>
  </g>
</svg>
