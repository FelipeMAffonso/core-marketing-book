<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Two demand curves. A steep inelastic curve loses little volume from a 50 percent price hike. A shallow elastic curve loses half of volume from the same hike. The elastic curve, shown in coral, is the case where the cut never pays back.">
  <g font-size="11" fill="#5C5C5C">
    <text x="160" y="34" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="0.6">INELASTIC</text>
    <text x="160" y="50" text-anchor="middle" font-size="11" font-style="italic">e &asymp; -0.1</text>

    <line x1="60" y1="220" x2="280" y2="220" stroke="#7A7A7A"/>
    <line x1="60" y1="80"  x2="60"  y2="220" stroke="#E8E6E1"/>
    <line x1="60" y1="110" x2="280" y2="184" stroke="#5C5C5C" stroke-width="2"/>

    <line x1="100" y1="220" x2="100" y2="113" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="60"  y1="113" x2="100" y2="113" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="220" y1="220" x2="220" y2="153" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="60"  y1="153" x2="220" y2="153" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

    <text x="50" y="118" text-anchor="end" font-size="11" fill="#5C5C5C">$1.50</text>
    <text x="50" y="158" text-anchor="end" font-size="11" fill="#5C5C5C">$1.00</text>
    <text x="100" y="236" text-anchor="middle" font-size="11" fill="#5C5C5C">100</text>
    <text x="220" y="236" text-anchor="middle" font-size="11" fill="#5C5C5C">105</text>
    <text x="160" y="262" text-anchor="middle" font-size="11" font-style="italic" fill="#888">50% hike, 5% loss</text>

    <text x="460" y="34" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="0.6" fill="#B8553A">ELASTIC</text>
    <text x="460" y="50" text-anchor="middle" font-size="11" font-style="italic" fill="#B8553A">e &asymp; -2</text>

    <line x1="340" y1="220" x2="600" y2="220" stroke="#7A7A7A"/>
    <line x1="340" y1="80"  x2="340" y2="220" stroke="#E8E6E1"/>
    <line x1="350" y1="110" x2="580" y2="220" stroke="#DA7756" stroke-width="2"/>

    <line x1="395" y1="220" x2="395" y2="132" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="340" y1="132" x2="395" y2="132" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="495" y1="220" x2="495" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="340" y1="180" x2="495" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

    <text x="330" y="138" text-anchor="end" font-size="11" fill="#5C5C5C">$1.50</text>
    <text x="330" y="186" text-anchor="end" font-size="11" fill="#5C5C5C">$1.00</text>
    <text x="395" y="236" text-anchor="middle" font-size="11" fill="#5C5C5C">50</text>
    <text x="495" y="236" text-anchor="middle" font-size="11" fill="#5C5C5C">150</text>
    <text x="460" y="262" text-anchor="middle" font-size="11" font-style="italic" fill="#B8553A">50% hike, 67% loss</text>
  </g>
</svg>
