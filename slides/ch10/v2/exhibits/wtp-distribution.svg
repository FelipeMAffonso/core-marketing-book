<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 260" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="A willingness-to-pay distribution for a Stanley tumbler. Buyers spread across a wide range from $20 up to $60, so a single posted price always misses someone on each side. The market price line at $35 is the firm's compromise.">
  <g font-size="11" fill="#5C5C5C">
    <line x1="64" y1="200" x2="624" y2="200" stroke="#7A7A7A"/>
    <line x1="64" y1="40" x2="64" y2="200" stroke="#E8E6E1"/>

    <g font-size="11" fill="#7A7A7A" text-anchor="middle">
      <text x="120" y="220">$20</text>
      <text x="240" y="220">$30</text>
      <text x="360" y="220">$40</text>
      <text x="480" y="220">$50</text>
      <text x="600" y="220">$60</text>
    </g>

    <path d="M 64 200 Q 200 96 360 92 Q 520 90 624 196 L 624 200 L 64 200 Z" fill="#E8E6E1" stroke="#7A7A7A" stroke-width="1.2"/>

    <line x1="320" y1="40" x2="320" y2="200" stroke="#DA7756" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="320" y="32" text-anchor="middle" font-size="12" fill="#B8553A" font-weight="700">posted price $35</text>

    <text x="120" y="178" font-size="11" fill="#5C5C5C" font-weight="600">low WTP</text>
    <text x="120" y="194" font-size="10" fill="#888">leaves money on the table here</text>

    <text x="540" y="178" font-size="11" fill="#5C5C5C" font-weight="600">high WTP</text>
    <text x="540" y="194" font-size="10" fill="#888">surplus the firm could have captured</text>

    <text x="344" y="248" text-anchor="middle" font-size="11" font-style="italic" fill="#7A7A7A">a single price cannot reach the spread; price-customization mechanisms claim it.</text>
  </g>
</svg>
