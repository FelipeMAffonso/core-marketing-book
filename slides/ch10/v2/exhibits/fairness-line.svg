<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Dual entitlement: the same dollar increase reads as fair when the firm tells a rising-cost story, and as gouging when it follows a demand spike. The fairness ceiling is the line buyers will not let the firm cross.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="60" y="80" width="540" height="100" fill="#F8F9FA"/>
    <line x1="60" y1="130" x2="600" y2="130" stroke="#DA7756" stroke-width="2"/>
    <text x="612" y="124" font-size="11" font-weight="700" fill="#B8553A">FAIRNESS CEILING</text>
    <text x="612" y="138" font-size="10" fill="#888">buyers reject above this line</text>

    <rect x="100" y="146" width="120" height="30" fill="#BDB7AC"/>
    <text x="160" y="166" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="600">+$1 (cost story)</text>
    <text x="160" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">below the ceiling</text>
    <text x="160" y="220" text-anchor="middle" font-size="11" fill="#7A7A7A">reads as fair</text>

    <rect x="380" y="84" width="120" height="46" fill="#DA7756"/>
    <text x="440" y="112" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">+$1 (demand spike)</text>
    <text x="440" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#B8553A">crosses the ceiling</text>
    <text x="440" y="220" text-anchor="middle" font-size="11" fill="#B8553A">reads as gouging</text>

    <text x="330" y="252" text-anchor="middle" font-size="12" font-style="italic" fill="#7A7A7A">Same dollar, opposite reaction, depending on the story the firm tells about why.</text>
  </g>
</svg>
