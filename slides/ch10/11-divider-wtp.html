<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 10 Pricing · 11 · Divider · Willingness to pay</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.divider{
    padding:64px 72px; display:flex; flex-direction:column; justify-content:center;
    background:#ffffff;
    border-left:6px solid var(--accent);
  }
  .divider .part{
    font-size:11px; font-weight:600; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--ink-mute);
    margin-bottom:18px;
  }
  .divider .num{
    font-size:160px; font-weight:300; line-height:1;
    color:var(--accent); letter-spacing:-0.03em;
    margin-bottom:8px;
  }
  .divider h2{
    font-size:46px; font-weight:500; line-height:1.1;
    color:var(--ink); letter-spacing:-0.02em;
    max-width: 23ch;
  }
  .divider h2 em{ font-style:italic; color:var(--accent); font-weight:400; }
  .divider .sub{
    font-size:22px; color:var(--ink-soft); font-weight:400;
    line-height:1.45; margin-top:22px; max-width:48ch; font-style:italic;
  }
  .divider .bar{ width:180px; height:1px; background:var(--rule); margin-top:28px; }
</style>
</head>
<body>
  <!-- 11 · SECTION DIVIDER · willingness to pay -->
  <section class="slide divider">
    <div class="part">Part 3 of 5 · Reading the ceiling</div>
    <div class="num">03</div>
    <h2>Willingness to pay varies <em>from one buyer to the next</em>.</h2>
    <p class="sub">A marketer who pays $35 for a tumbler still prices for a buyer who pays $20 and one who pays $60. That spread is what gives demand its slope.</p>
    <div class="bar"></div>
  </section>
</body>
</html>
