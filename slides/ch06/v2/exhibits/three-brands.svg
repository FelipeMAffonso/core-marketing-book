<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Three brand applications of the STP machinery. Stanley re-pointed the same product at a new buyer the dashboard was not counting. Trader Joe's held one narrow position for sixty years. Liquid Death entered a flat category by inventing a meaning no one had claimed. Each is a different answer to the same question.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="40"  y="40" width="200" height="240" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="140" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">STANLEY</text>
    <text x="140" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">found the missed buyer</text>
    <line x1="60" y1="100" x2="220" y2="100" stroke="#E8E6E1"/>
    <text x="140" y="124" text-anchor="middle" font-size="12" font-weight="700">10x revenue, 4 years</text>
    <text x="60" y="156" font-size="11">same 1913 product</text>
    <text x="60" y="176" font-size="11">new buyer: desk-and-daily</text>
    <text x="60" y="196" font-size="11">pastel drops, scarcity</text>
    <text x="140" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">re-segmentation</text>
    <text x="140" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">won the category</text>
    <text x="140" y="266" text-anchor="middle" font-size="10" font-style="italic" fill="#7A7A7A">$73M to $800M</text>

    <rect x="260" y="40" width="200" height="240" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="360" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">TRADER JOE'S</text>
    <text x="360" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">held one position 60 years</text>
    <line x1="280" y1="100" x2="440" y2="100" stroke="#E8E6E1"/>
    <text x="360" y="124" text-anchor="middle" font-size="12" font-weight="700">3.5x sales per sq ft</text>
    <text x="280" y="156" font-size="11">80% private label</text>
    <text x="280" y="176" font-size="11">4,000 SKUs, not 30,000</text>
    <text x="280" y="196" font-size="11">no loyalty card</text>
    <text x="360" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">concentrated targeting</text>
    <text x="360" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">defended for sixty years</text>
    <text x="360" y="266" text-anchor="middle" font-size="10" font-style="italic" fill="#7A7A7A">$2,100 / sq ft vs $600 avg</text>

    <rect x="480" y="40" width="200" height="240" fill="#FFFFFF" stroke="#DA7756" stroke-width="1.6" rx="2"/>
    <text x="580" y="68" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.6" fill="#B8553A">LIQUID DEATH</text>
    <text x="580" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#5C5C5C">invented a meaning</text>
    <line x1="500" y1="100" x2="660" y2="100" stroke="#E8E6E1"/>
    <text x="580" y="124" text-anchor="middle" font-size="12" font-weight="700">$1.4B by 2024</text>
    <text x="500" y="156" font-size="11">water in a tallboy can</text>
    <text x="500" y="176" font-size="11">"Murder Your Thirst"</text>
    <text x="500" y="196" font-size="11">identity, not wellness</text>
    <text x="580" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">reframed the comparison</text>
    <text x="580" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#B8553A">+27% per unit at same price</text>
    <text x="580" y="266" text-anchor="middle" font-size="10" font-style="italic" fill="#7A7A7A">cash value of meaning</text>

    <text x="360" y="306" text-anchor="middle" font-size="12" font-style="italic" fill="#7A7A7A">Three brands, three different answers to the same question.</text>
  </g>
</svg>
