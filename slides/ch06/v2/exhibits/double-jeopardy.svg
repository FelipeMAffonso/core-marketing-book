<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The double-jeopardy law. A smaller brand suffers two penalties at once: fewer category buyers buy it, and the buyers it keeps purchase slightly less often than the leaders' buyers do. Coca-Cola: 75 percent of soda buyers, 9 times a year. Dr Pepper: 25 percent of buyers, 7 times. The smaller brand's two stacked penalties are drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">DOUBLE-JEOPARDY LAW. US SODA CATEGORY.</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <g>
      <text x="200" y="80" text-anchor="middle" font-size="13" font-weight="700">Coca-Cola</text>
      <text x="200" y="98" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">about 45% market share</text>

      <rect x="120" y="120" width="160" height="80" fill="#7A7A7A" opacity="0.7"/>
      <text x="200" y="146" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">75%</text>
      <text x="200" y="166" text-anchor="middle" font-size="10" fill="#fff">of soda buyers</text>
      <text x="200" y="184" text-anchor="middle" font-size="10" fill="#fff">reach it</text>

      <text x="200" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#5C5C5C">9x</text>
      <text x="200" y="246" text-anchor="middle" font-size="10" fill="#7A7A7A">purchases per buyer per year</text>
    </g>

    <g>
      <text x="500" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#B8553A">Dr Pepper</text>
      <text x="500" y="98" text-anchor="middle" font-size="10" fill="#B8553A" font-style="italic">about 7% market share</text>

      <rect x="460" y="160" width="80" height="40" fill="#DA7756"/>
      <text x="500" y="178" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">25%</text>
      <text x="500" y="194" text-anchor="middle" font-size="9" fill="#fff">reach</text>

      <text x="500" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#DA7756">7x</text>
      <text x="500" y="246" text-anchor="middle" font-size="10" fill="#B8553A">per buyer per year</text>
    </g>

    <text x="350" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#B8553A" letter-spacing="1.2">PENALTY 1</text>
    <text x="350" y="174" text-anchor="middle" font-size="9" fill="#B8553A" font-style="italic">fewer buyers</text>

    <text x="350" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#B8553A" letter-spacing="1.2">PENALTY 2</text>
    <text x="350" y="234" text-anchor="middle" font-size="9" fill="#B8553A" font-style="italic">less often</text>

    <text x="360" y="290" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">The loyalty gap (9 against 7) is far too small to rescue the smaller brand</text>
    <text x="360" y="304" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">from its smaller buyer base. Brands grow by reaching more category buyers.</text>
  </g>
</svg>
