<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The mental ladder for the 1962 US rental-car category, with Hertz on the top rung and Avis claiming the second rung out loud. Three rungs is normal, seven is about the most anyone holds. The claimed rung Avis ran on is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">MENTAL LADDER. RENTAL CARS, 1962.</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <line x1="240" y1="80" x2="500" y2="80" stroke="#7A7A7A" stroke-width="1.4"/>
    <text x="220" y="84" text-anchor="end" font-size="11" fill="#7A7A7A">1.</text>
    <text x="370" y="74" text-anchor="middle" font-size="14" font-weight="700">Hertz</text>
    <text x="520" y="84" font-size="11" font-style="italic" fill="#7A7A7A">the default answer</text>

    <line x1="240" y1="130" x2="500" y2="130" stroke="#DA7756" stroke-width="2"/>
    <text x="220" y="134" text-anchor="end" font-size="11" fill="#B8553A" font-weight="700">2.</text>
    <text x="370" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#B8553A">Avis</text>
    <text x="520" y="134" font-size="11" font-style="italic" fill="#B8553A">claimed out loud: "we try harder"</text>

    <line x1="240" y1="180" x2="500" y2="180" stroke="#7A7A7A" stroke-width="1"/>
    <text x="220" y="184" text-anchor="end" font-size="11" fill="#7A7A7A">3.</text>
    <text x="370" y="174" text-anchor="middle" font-size="13" font-weight="600">National</text>

    <line x1="240" y1="222" x2="500" y2="222" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="220" y="226" text-anchor="end" font-size="11" fill="#BDB7AC">4.</text>
    <text x="370" y="216" text-anchor="middle" font-size="11" fill="#888" font-style="italic">few buyers name a fourth</text>

    <line x1="240" y1="80" x2="240" y2="222" stroke="#7A7A7A" stroke-width="1"/>
    <line x1="500" y1="80" x2="500" y2="222" stroke="#7A7A7A" stroke-width="1"/>

    <text x="360" y="276" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">One ladder per category. Three rungs is typical; seven is about the most anyone holds.</text>
    <text x="360" y="292" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">The top-rung brand wins most decisions by default.</text>
  </g>
</svg>
