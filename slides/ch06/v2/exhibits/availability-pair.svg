<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The two market-based assets a brand grows on. Mental availability is being easy to bring to mind across occasions and cues. Physical availability is being easy to find and buy across channels and shelves. Both legs matter: a brand wins only when it is both easy to think of and easy to buy. The pair are framed with coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">A BRAND WINS ON TWO LEGS</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <rect x="60" y="64" width="280" height="200" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="200" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.2">MENTAL AVAILABILITY</text>
    <text x="200" y="106" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">easy to bring to mind</text>

    <line x1="100" y1="124" x2="300" y2="124" stroke="#E8E6E1"/>
    <text x="80" y="146" font-size="11" fill="#1a1a1a">7W audit of buying occasions</text>
    <text x="80" y="166" font-size="11" fill="#1a1a1a">distinctiveness grid for assets</text>
    <text x="80" y="186" font-size="11" fill="#1a1a1a">strong links from cue to brand</text>

    <text x="80" y="222" font-size="10" fill="#7A7A7A" font-style="italic">e.g., Coca-Cola, every occasion</text>
    <text x="80" y="238" font-size="10" fill="#7A7A7A" font-style="italic">e.g., the 1959 VW layout, still recognizable</text>

    <rect x="380" y="64" width="280" height="200" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="520" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.2">PHYSICAL AVAILABILITY</text>
    <text x="520" y="106" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">easy to find and buy</text>

    <line x1="420" y1="124" x2="620" y2="124" stroke="#E8E6E1"/>
    <text x="400" y="146" font-size="11" fill="#1a1a1a">distribution breadth</text>
    <text x="400" y="166" font-size="11" fill="#1a1a1a">shelf presence and SKU range</text>
    <text x="400" y="186" font-size="11" fill="#1a1a1a">channels matching every occasion</text>

    <text x="400" y="222" font-size="10" fill="#7A7A7A" font-style="italic">e.g., Lexus growing through more dealers</text>
    <text x="400" y="238" font-size="10" fill="#7A7A7A" font-style="italic">e.g., the Distribution chapter's full topic</text>

    <text x="360" y="294" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">STP picks the category the brand competes in. These two assets grow the brand once that choice is locked.</text>
  </g>
</svg>
