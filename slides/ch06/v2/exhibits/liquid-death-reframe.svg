<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Liquid Death changed the competitive frame buyers used. The same Alpine water on the same shelf at the same price earned 27 percent more revenue per unit once the can carried the Liquid Death identity, the cash value of meaning alone. The lift figure is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">SAME WATER. SAME SHELF PRICE. THE LABEL IS THE BRAND.</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <g transform="translate(150,80)">
      <rect x="-22" y="0" width="44" height="120" fill="none" stroke="#7A7A7A" stroke-width="1.4" rx="2"/>
      <rect x="-22" y="-6" width="44" height="6" fill="#7A7A7A"/>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#7A7A7A" font-weight="600">unbranded</text>
      <text x="0" y="74" text-anchor="middle" font-size="9" fill="#7A7A7A">water</text>
    </g>
    <text x="150" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#5C5C5C">baseline</text>
    <text x="150" y="240" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">same Alpine source</text>

    <line x1="220" y1="140" x2="280" y2="140" stroke="#7A7A7A" stroke-width="1.2"/>
    <polygon points="280,140 268,134 268,146" fill="#7A7A7A"/>
    <text x="250" y="124" text-anchor="middle" font-size="10" fill="#7A7A7A" letter-spacing="0.6" font-weight="600">RELABEL</text>
    <text x="250" y="158" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">only the meaning changed</text>

    <g transform="translate(360,80)">
      <rect x="-22" y="0" width="44" height="120" fill="none" stroke="#DA7756" stroke-width="2" rx="2"/>
      <rect x="-22" y="-6" width="44" height="6" fill="#DA7756"/>
      <text x="0" y="44" text-anchor="middle" font-size="8" fill="#B8553A" font-weight="700">LIQUID</text>
      <text x="0" y="56" text-anchor="middle" font-size="8" fill="#B8553A" font-weight="700">DEATH</text>
      <text x="0" y="84" text-anchor="middle" font-size="7" fill="#B8553A" font-style="italic">Murder</text>
      <text x="0" y="94" text-anchor="middle" font-size="7" fill="#B8553A" font-style="italic">Your Thirst</text>
    </g>
    <text x="360" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A">Liquid Death</text>
    <text x="360" y="240" text-anchor="middle" font-size="10" fill="#B8553A" font-style="italic">heavy-metal tallboy can</text>

    <line x1="430" y1="140" x2="490" y2="140" stroke="#DA7756" stroke-width="1.2"/>
    <polygon points="490,140 478,134 478,146" fill="#DA7756"/>

    <rect x="510" y="74" width="160" height="142" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="590" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.2">REVENUE PER UNIT</text>
    <text x="590" y="160" text-anchor="middle" font-size="36" font-weight="700" fill="#DA7756">+27%</text>
    <text x="590" y="188" text-anchor="middle" font-size="11" fill="#B8553A" font-style="italic">vs. identical unbranded water</text>
    <text x="590" y="204" text-anchor="middle" font-size="10" fill="#888">2025 price test</text>

    <text x="360" y="278" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Liquid Death changed the comparison the buyer was making, from wellness to identity.</text>
  </g>
</svg>
