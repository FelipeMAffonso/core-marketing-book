<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="A perceptual map for insulated drinkware on price by ruggedness-and-heritage. Stanley sits upper-left, Yeti upper-right, Hydro Flask and Owala in the middle. The empty lower-right quadrant looks like an opening, but the buyer ideal points cluster on the existing brands and not in that corner, so it is dead air. The chosen target's ideal cluster is drawn in coral.">
  <g font-size="11" fill="#1a1a1a">
    <line x1="80" y1="60" x2="80" y2="290" stroke="#7A7A7A" stroke-width="1"/>
    <line x1="80" y1="290" x2="660" y2="290" stroke="#7A7A7A" stroke-width="1"/>

    <line x1="370" y1="60" x2="370" y2="290" stroke="#BDB7AC" stroke-width="0.6" stroke-dasharray="3,3"/>
    <line x1="80" y1="175" x2="660" y2="175" stroke="#BDB7AC" stroke-width="0.6" stroke-dasharray="3,3"/>

    <text x="370" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#5C5C5C">price</text>
    <text x="92" y="304" font-size="10" fill="#7A7A7A">low</text>
    <text x="650" y="304" text-anchor="end" font-size="10" fill="#7A7A7A">high</text>

    <text x="60" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#5C5C5C" transform="rotate(-90 60 175)">ruggedness, heritage</text>
    <text x="74" y="76" text-anchor="end" font-size="10" fill="#7A7A7A">high</text>
    <text x="74" y="290" text-anchor="end" font-size="10" fill="#7A7A7A">low</text>

    <circle cx="220" cy="100" r="6" fill="#1a1a1a"/>
    <text x="220" y="88"  text-anchor="middle" font-size="12" font-weight="700">Stanley</text>
    <text x="220" y="120" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">est. 1913</text>

    <circle cx="540" cy="106" r="6" fill="#1a1a1a"/>
    <text x="540" y="94"  text-anchor="middle" font-size="12" font-weight="700">Yeti</text>
    <text x="540" y="126" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">hunter / angler</text>

    <circle cx="320" cy="190" r="5" fill="#1a1a1a"/>
    <text x="320" y="210" text-anchor="middle" font-size="11" font-weight="600">Hydro Flask</text>

    <circle cx="240" cy="220" r="5" fill="#1a1a1a"/>
    <text x="240" y="240" text-anchor="middle" font-size="11" font-weight="600">Owala</text>

    <rect x="490" y="200" width="160" height="80" fill="none" stroke="#BDB7AC" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="570" y="234" text-anchor="middle" font-size="10" fill="#888" font-style="italic">no brand,</text>
    <text x="570" y="250" text-anchor="middle" font-size="10" fill="#888" font-style="italic">no ideal points</text>
    <text x="570" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#888">dead air</text>

    <circle cx="220" cy="100" r="34" fill="#DA7756" opacity="0.18"/>
    <circle cx="210" cy="92"  r="2.2" fill="#DA7756"/>
    <circle cx="232" cy="106" r="2.2" fill="#DA7756"/>
    <circle cx="226" cy="120" r="2.2" fill="#DA7756"/>
    <circle cx="208" cy="116" r="2.2" fill="#DA7756"/>
    <text x="160" y="80" text-anchor="end" font-size="10" font-weight="700" fill="#B8553A">ideal points</text>
    <text x="160" y="94" text-anchor="end" font-size="10" fill="#B8553A" font-style="italic">desk-and-daily buyer</text>

    <circle cx="540" cy="106" r="28" fill="#DA7756" opacity="0.10"/>
    <circle cx="528" cy="100" r="2.2" fill="#DA7756"/>
    <circle cx="548" cy="118" r="2.2" fill="#DA7756"/>
    <circle cx="552" cy="98"  r="2.2" fill="#DA7756"/>

    <text x="370" y="358" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">An empty quadrant is an opening ONLY when buyer ideal points cluster in it.</text>
  </g>
</svg>
