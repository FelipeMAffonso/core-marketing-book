<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The four-step diagnostic students carry into client projects. Name the segment in one plain sentence. Score it on the five criteria. Write the positioning statement. Place the brand on a perceptual map and ask whether the empty quadrant is dead air. The closing recap of the chapter's machinery, with the final step drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">THE DIAGNOSTIC YOU CARRY INTO A CLIENT PROJECT</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <g>
      <circle cx="116" cy="118" r="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <text x="116" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#5C5C5C">1</text>
      <text x="116" y="170" text-anchor="middle" font-size="12" font-weight="700">NAME THE SEGMENT</text>
      <text x="116" y="188" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">one plain sentence</text>
    </g>

    <line x1="142" y1="118" x2="218" y2="118" stroke="#BDB7AC" stroke-width="0.8"/>

    <g>
      <circle cx="244" cy="118" r="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <text x="244" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#5C5C5C">2</text>
      <text x="244" y="170" text-anchor="middle" font-size="12" font-weight="700">SCORE THE CUT</text>
      <text x="244" y="188" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">five-criteria filter</text>
    </g>

    <line x1="270" y1="118" x2="346" y2="118" stroke="#BDB7AC" stroke-width="0.8"/>

    <g>
      <circle cx="372" cy="118" r="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <text x="372" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#5C5C5C">3</text>
      <text x="372" y="170" text-anchor="middle" font-size="12" font-weight="700">WRITE THE POSITION</text>
      <text x="372" y="188" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">target. need. POD. RTB.</text>
    </g>

    <line x1="398" y1="118" x2="474" y2="118" stroke="#DA7756" stroke-width="1.2"/>

    <g>
      <circle cx="500" cy="118" r="24" fill="none" stroke="#DA7756" stroke-width="2"/>
      <text x="500" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#B8553A">4</text>
      <text x="500" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#B8553A">PLACE IT ON A MAP</text>
      <text x="500" y="188" text-anchor="middle" font-size="11" fill="#B8553A" font-style="italic">test the empty quadrant</text>
    </g>

    <line x1="528" y1="118" x2="600" y2="118" stroke="#DA7756" stroke-width="1.2"/>
    <polygon points="600,118 588,112 588,124" fill="#DA7756"/>
    <text x="640" y="114" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A">defendable</text>
    <text x="640" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A">position</text>

    <text x="360" y="220" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Run it once on a brand you know and the tools stop being abstract.</text>
  </g>
</svg>
