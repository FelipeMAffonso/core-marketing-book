<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The targeting-ethics line. Three lawful purchase descriptors (unscented lotion, prenatal vitamins, a larger handbag) combine through one inference into a protected trait (pregnancy). Acting on the inference is the violation. The do-not-cross line is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">EACH VARIABLE IS LAWFUL. THE COMBINATION IS NOT.</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <g>
      <rect x="50" y="76" width="140" height="40" fill="none" stroke="#7A7A7A" stroke-width="1"/>
      <text x="120" y="100" text-anchor="middle" font-size="12">unscented lotion</text>
    </g>
    <g>
      <rect x="50" y="136" width="140" height="40" fill="none" stroke="#7A7A7A" stroke-width="1"/>
      <text x="120" y="160" text-anchor="middle" font-size="12">prenatal vitamins</text>
    </g>
    <g>
      <rect x="50" y="196" width="140" height="40" fill="none" stroke="#7A7A7A" stroke-width="1"/>
      <text x="120" y="220" text-anchor="middle" font-size="12">larger handbag</text>
    </g>

    <polyline points="190,96 250,156 270,156" fill="none" stroke="#7A7A7A" stroke-width="1"/>
    <line x1="190" y1="156" x2="270" y2="156" stroke="#7A7A7A" stroke-width="1"/>
    <polyline points="190,216 250,156 270,156" fill="none" stroke="#7A7A7A" stroke-width="1"/>
    <polygon points="270,156 258,150 258,162" fill="#7A7A7A"/>

    <rect x="290" y="130" width="160" height="60" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
    <text x="370" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="0.8">INFERRED</text>
    <text x="370" y="176" text-anchor="middle" font-size="13" font-weight="700">pregnancy</text>

    <line x1="496" y1="60" x2="496" y2="252" stroke="#DA7756" stroke-width="2.4"/>
    <text x="500" y="76" font-size="10" font-weight="700" fill="#DA7756" letter-spacing="1.2">DO NOT CROSS</text>

    <line x1="450" y1="160" x2="490" y2="160" stroke="#DA7756" stroke-width="1.2" stroke-dasharray="3,3"/>
    <polygon points="490,160 478,154 478,166" fill="#DA7756"/>

    <rect x="510" y="130" width="160" height="60" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="590" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="0.8">PROTECTED TRAIT</text>
    <text x="590" y="174" text-anchor="middle" font-size="11" fill="#B8553A">acting on it = the violation</text>

    <text x="360" y="264" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">The model being accurate is exactly what made it a violation. The Target case, 2012.</text>
  </g>
</svg>
