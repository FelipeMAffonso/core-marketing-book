<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The 1959 VW Beetle Think Small ad layout. The Beetle sits small and low in a wide empty field of white, the size the buyer would notice anyway turned into the position. By 1965 the Beetle held 67 percent of the US imported-car market, drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="40" y="40" width="640" height="200" fill="none" stroke="#7A7A7A" stroke-width="0.8"/>

    <g transform="translate(180,162)">
      <ellipse cx="0" cy="14" rx="38" ry="8" fill="#1a1a1a" opacity="0.06"/>
      <path d="M -28,0 Q -28,-18 -14,-22 L 14,-22 Q 28,-18 28,0 L 28,8 Q 28,12 24,12 L -24,12 Q -28,12 -28,8 Z"
            fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
      <path d="M -14,-22 L -6,-12 L 14,-12 L 14,-22 Z" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="-16" cy="10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
      <circle cx="14" cy="10" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    </g>

    <text x="180" y="220" text-anchor="middle" font-size="20" font-weight="600" fill="#1a1a1a" font-style="italic">Think small.</text>

    <line x1="430" y1="100" x2="640" y2="100" stroke="#E8E6E1"/>
    <text x="430" y="90" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">THE BERNBACH RULE</text>
    <text x="430" y="124" font-size="13" fill="#1a1a1a">Name the awkward fact the</text>
    <text x="430" y="142" font-size="13" fill="#1a1a1a">buyer is already thinking.</text>
    <text x="430" y="166" font-size="11" fill="#7A7A7A" font-style="italic">Then turn it into the position.</text>

    <line x1="430" y1="184" x2="640" y2="184" stroke="#FDE2D6"/>
    <text x="430" y="206" font-size="24" font-weight="700" fill="#DA7756">67%</text>
    <text x="470" y="206" font-size="12" font-weight="600" fill="#B8553A">share by 1965</text>
    <text x="430" y="224" font-size="10" fill="#888" font-style="italic">US imported-car market, on one model</text>

    <text x="360" y="276" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Positioning is not what you do to the product. Volkswagen did not change the Beetle.</text>
  </g>
</svg>
