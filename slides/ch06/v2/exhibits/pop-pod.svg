<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Points of parity and points of difference as two overlapping circles. The overlap holds what every brand in the category needs just to belong; the edge that sticks out is the only thing buyers will choose this brand for. The point of difference edge is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <circle cx="290" cy="170" r="106" fill="none" stroke="#7A7A7A" stroke-width="1.2"/>
    <circle cx="430" cy="170" r="106" fill="none" stroke="#DA7756" stroke-width="2"/>

    <text x="216" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.2">RIVALS</text>
    <text x="216" y="116" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">what they have</text>

    <text x="360" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.2">POINTS OF PARITY</text>
    <text x="360" y="94" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">the price of admission</text>
    <text x="360" y="170" text-anchor="middle" font-size="12" font-weight="600">a coffee shop must</text>
    <text x="360" y="186" text-anchor="middle" font-size="12" font-weight="600">serve coffee</text>
    <text x="360" y="226" text-anchor="middle" font-size="10" fill="#888" font-style="italic">absence loses the buyer</text>
    <text x="360" y="240" text-anchor="middle" font-size="10" fill="#888" font-style="italic">before any comparison starts</text>

    <text x="504" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.2">POINTS OF DIFFERENCE</text>
    <text x="504" y="116" text-anchor="middle" font-size="11" fill="#B8553A" font-style="italic">the reason a buyer picks you</text>

    <line x1="504" y1="158" x2="504" y2="226" stroke="#DA7756" stroke-width="1"/>
    <text x="504" y="178" text-anchor="middle" font-size="11" fill="#B8553A">desirable</text>
    <text x="504" y="196" text-anchor="middle" font-size="11" fill="#B8553A">deliverable</text>
    <text x="504" y="214" text-anchor="middle" font-size="11" fill="#B8553A">differentiating</text>

    <text x="360" y="296" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">POPs do not win the choice. Their absence loses it. PODs win the choice if they pass three tests.</text>
  </g>
</svg>
