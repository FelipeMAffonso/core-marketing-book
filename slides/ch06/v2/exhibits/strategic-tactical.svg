<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The strategic-to-tactical bridge. A strategy sentence about a target buyer narrows through a translation gate into the descriptors an ad platform will actually sell, and the resulting list is the customer profile. The buyable profile is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="40" y="56" width="220" height="160" fill="none" stroke="#BDB7AC" stroke-width="1"/>
    <text x="150" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.2">STRATEGIC SEGMENT</text>
    <text x="60" y="116" font-size="12" fill="#1a1a1a">women 25 to 44</text>
    <text x="60" y="138" font-size="12" fill="#1a1a1a">who treat hydration</text>
    <text x="60" y="160" font-size="12" fill="#1a1a1a">as part of who they are</text>
    <text x="150" y="200" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">how a strategist writes it</text>

    <polygon points="290,136 330,136 325,116 360,136 325,156 330,136" fill="#7A7A7A" opacity="0.5"/>
    <text x="325" y="100" text-anchor="middle" font-size="10" fill="#7A7A7A" letter-spacing="1" font-weight="600">TRANSLATE</text>
    <text x="325" y="178" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">to descriptors a platform sells</text>

    <rect x="400" y="56" width="280" height="160" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="540" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.2">CUSTOMER PROFILE</text>
    <text x="420" y="108" font-size="11" fill="#1a1a1a">TikTok users in US metros over 250k</text>
    <text x="420" y="128" font-size="11" fill="#1a1a1a">household income above $60k</text>
    <text x="420" y="148" font-size="11" fill="#1a1a1a">prior engagement with wellness or fitness</text>
    <text x="420" y="168" font-size="11" fill="#1a1a1a">interest tags: outdoors, athleisure, cup drops</text>
    <text x="540" y="200" text-anchor="middle" font-size="10" fill="#B8553A" font-style="italic">what a media planner can actually buy</text>

    <text x="360" y="252" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Score the profile two ways. Effectiveness: does it reach the valuable buyers?</text>
    <text x="360" y="266" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Cost efficiency: does it reach only them, or three times as many you do not want?</text>
  </g>
</svg>
