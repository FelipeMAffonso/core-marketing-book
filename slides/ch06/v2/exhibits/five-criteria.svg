<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The five-criteria segmentation filter: a slice has to be measurable, accessible, substantial, differentiable, and actionable. A slice that fails any one is research, not a usable segment. The fifth and most-often-failed criterion, actionable, is drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">A USABLE SEGMENT PASSES FIVE TESTS</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <g>
      <rect x="60" y="62" width="22" height="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <polyline points="64,72 70,80 78,66" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
      <text x="98" y="74" font-size="14" font-weight="600">Measurable</text>
      <text x="98" y="92" font-size="11" fill="#7A7A7A" font-style="italic">size and buying power estimable from data the firm can get</text>
    </g>

    <g transform="translate(0,52)">
      <rect x="60" y="62" width="22" height="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <polyline points="64,72 70,80 78,66" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
      <text x="98" y="74" font-size="14" font-weight="600">Accessible</text>
      <text x="98" y="92" font-size="11" fill="#7A7A7A" font-style="italic">the firm can reach the segment with a marketing program</text>
    </g>

    <g transform="translate(0,104)">
      <rect x="60" y="62" width="22" height="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <polyline points="64,72 70,80 78,66" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
      <text x="98" y="74" font-size="14" font-weight="600">Substantial</text>
      <text x="98" y="92" font-size="11" fill="#7A7A7A" font-style="italic">large and profitable enough to repay the cost of serving it</text>
    </g>

    <g transform="translate(0,156)">
      <rect x="60" y="62" width="22" height="22" fill="none" stroke="#7A7A7A" stroke-width="1.4"/>
      <polyline points="64,72 70,80 78,66" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
      <text x="98" y="74" font-size="14" font-weight="600">Differentiable</text>
      <text x="98" y="92" font-size="11" fill="#7A7A7A" font-style="italic">responds differently than other segments to a different program</text>
    </g>

    <g transform="translate(0,208)">
      <rect x="60" y="62" width="22" height="22" fill="none" stroke="#DA7756" stroke-width="1.8"/>
      <polyline points="64,72 70,80 78,66" fill="none" stroke="#DA7756" stroke-width="1.8"/>
      <text x="98" y="74" font-size="14" font-weight="700" fill="#B8553A">Actionable</text>
      <text x="98" y="92" font-size="11" fill="#B8553A" font-style="italic">the firm has the resources to run a program for it. the most-often-failed test.</text>
    </g>
  </g>
</svg>
