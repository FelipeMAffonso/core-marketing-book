<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="The four-clause positioning statement template: for target who need, brand is the category that biggest difference because reason to believe. The reason-to-believe clause is the one a rival cannot say word for word, drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <text x="60" y="36" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">THE STATEMENT, FOUR CLAUSES</text>
    <line x1="60" y1="44" x2="660" y2="44" stroke="#E8E6E1"/>

    <text x="60" y="92" font-size="20" fill="#1a1a1a" font-style="italic">For</text>
    <text x="104" y="92" font-size="20" font-weight="700" fill="#5C5C5C">[ target ]</text>
    <text x="60" y="116" font-size="11" fill="#7A7A7A">who [ has this need ]</text>

    <text x="60" y="156" font-size="20" font-weight="700" fill="#5C5C5C">[ brand ]</text>
    <text x="60" y="180" font-size="11" fill="#7A7A7A">is the [ category ]</text>

    <text x="60" y="220" font-size="20" fill="#1a1a1a" font-style="italic">that</text>
    <text x="108" y="220" font-size="20" font-weight="700" fill="#5C5C5C">[ biggest difference ]</text>

    <text x="60" y="260" font-size="20" fill="#B8553A" font-style="italic">because</text>
    <text x="160" y="260" font-size="20" font-weight="700" fill="#B8553A">[ reason to believe ]</text>
    <text x="60" y="282" font-size="11" fill="#B8553A" font-style="italic">the clause a rival cannot say word for word</text>

    <line x1="440" y1="60" x2="440" y2="290" stroke="#E8E6E1" stroke-width="0.8"/>

    <text x="460" y="84" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.2">CLAUSE AUDIT</text>
    <text x="460" y="108" font-size="11" fill="#1a1a1a">target. one plain sentence.</text>
    <text x="460" y="128" font-size="11" fill="#1a1a1a">need. unprompted on a survey.</text>
    <text x="460" y="148" font-size="11" fill="#1a1a1a">category. who you fight.</text>
    <text x="460" y="168" font-size="11" fill="#1a1a1a">difference. desirable, deliverable,</text>
    <text x="460" y="182" font-size="11" fill="#1a1a1a">differentiating.</text>
    <text x="460" y="206" font-size="11" fill="#B8553A" font-weight="600">RTB. firm can prove the claim.</text>
    <text x="460" y="220" font-size="11" fill="#B8553A">rival cannot match it.</text>

    <text x="460" y="262" font-size="10" fill="#888" font-style="italic">An internal working document,</text>
    <text x="460" y="276" font-size="10" fill="#888" font-style="italic">not a consumer tagline.</text>
  </g>
</svg>
