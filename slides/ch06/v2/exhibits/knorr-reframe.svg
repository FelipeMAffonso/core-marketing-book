<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Knorr in India reframed the same packet soup from a Western dinner starter occasion to a pre-dinner children's snack occasion, and sales rose 127 percent in six months on a product the firm never reformulated. The lift figure and the new occasion are drawn in coral.">
  <g font-size="12" fill="#1a1a1a">
    <rect x="40"  y="40" width="280" height="160" fill="none" stroke="#BDB7AC" stroke-width="1"/>
    <text x="180" y="64" text-anchor="middle" font-size="11" font-weight="700" fill="#5C5C5C" letter-spacing="1.4">BEFORE</text>
    <text x="180" y="92" text-anchor="middle" font-size="13" font-weight="600">Western dinner starter</text>
    <text x="180" y="116" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">an occasion Indian households were not running</text>
    <line x1="80" y1="138" x2="280" y2="138" stroke="#E8E6E1" stroke-width="0.8"/>
    <text x="180" y="160" text-anchor="middle" font-size="11" fill="#7A7A7A">same packet soup</text>
    <text x="180" y="178" text-anchor="middle" font-size="11" fill="#7A7A7A">low volume. quiet shelf.</text>

    <line x1="340" y1="120" x2="380" y2="120" stroke="#DA7756" stroke-width="2"/>
    <polygon points="380,120 368,114 368,126" fill="#DA7756"/>
    <text x="360" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#B8553A" letter-spacing="1">REFRAME</text>
    <text x="360" y="140" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">change the occasion,</text>
    <text x="360" y="154" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">not the product</text>

    <rect x="400" y="40" width="280" height="160" fill="none" stroke="#DA7756" stroke-width="1.6"/>
    <text x="540" y="64" text-anchor="middle" font-size="11" font-weight="700" fill="#B8553A" letter-spacing="1.4">AFTER</text>
    <text x="540" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#B8553A">healthy pre-dinner</text>
    <text x="540" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#B8553A">children's snack</text>
    <text x="540" y="128" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">an occasion mothers were already trying to fill</text>
    <line x1="440" y1="148" x2="640" y2="148" stroke="#FDE2D6" stroke-width="0.8"/>
    <text x="540" y="172" text-anchor="middle" font-size="18" font-weight="700" fill="#DA7756">+127%</text>
    <text x="540" y="190" text-anchor="middle" font-size="11" fill="#888">sales, six months</text>

    <text x="360" y="240" text-anchor="middle" font-size="12" font-style="italic" fill="#7A7A7A">The demand space is the occasion that triggers the need. Own the right occasion and a brand grows without winning a single new customer.</text>
  </g>
</svg>
