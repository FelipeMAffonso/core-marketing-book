<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 6 STP · 14 · Points of parity and difference</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 14 · EXHIBIT · POP/POD architecture (lifted from chapter fig-3; recolored to ONE coral motif on the POD side) -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Points of parity earn a place in the category. <em>Points of difference win the choice.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 6.4 · The POP/POD architecture · three POD tests, three POP sub-types</span>
      <svg viewBox="0 0 720 470" preserveAspectRatio="xMidYMid meet" role="img" aria-label="POP/POD architecture. The top band shows the three tests every point of difference must pass; the bottom band shows the three sub-types of points of parity.">
        <defs>
          <linearGradient id="pod-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#DA7756" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#DA7756" stop-opacity="0.04"/>
          </linearGradient>
        </defs>
        <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#1a1a1a">
          <!-- POD top band: the ONE coral motif (the side that wins the choice) -->
          <text x="60" y="34" font-weight="700" fill="#DA7756" font-size="12" letter-spacing="1.6">POINTS OF DIFFERENCE (POD) · WIN THE CHOICE</text>
          <text x="60" y="52" fill="#7A7A7A" font-size="12" font-style="italic">three tests every POD has to pass</text>
          <rect x="60" y="68" width="180" height="120" fill="url(#pod-fill)" stroke="#DA7756" stroke-width="1.5" rx="2"/>
          <text x="150" y="94" text-anchor="middle" font-weight="700" fill="#DA7756" font-size="14">DESIRABLE</text>
          <text x="150" y="120" text-anchor="middle" fill="#1a1a1a" font-size="12">buyers want it</text>
          <text x="150" y="142" text-anchor="middle" fill="#5C5C5C" font-size="11">named unprompted on a survey</text>
          <text x="150" y="170" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">e.g., NIVEA + coenzyme Q10</text>
          <rect x="270" y="68" width="180" height="120" fill="url(#pod-fill)" stroke="#DA7756" stroke-width="1.5" rx="2"/>
          <text x="360" y="94" text-anchor="middle" font-weight="700" fill="#DA7756" font-size="14">DELIVERABLE</text>
          <text x="360" y="120" text-anchor="middle" fill="#1a1a1a" font-size="12">the firm can prove it</text>
          <text x="360" y="142" text-anchor="middle" fill="#5C5C5C" font-size="11">repeatable and verifiable</text>
          <text x="360" y="170" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">e.g., Splenda made from sugar</text>
          <rect x="480" y="68" width="180" height="120" fill="url(#pod-fill)" stroke="#DA7756" stroke-width="1.5" rx="2"/>
          <text x="570" y="94" text-anchor="middle" font-weight="700" fill="#DA7756" font-size="14">DIFFERENTIATING</text>
          <text x="570" y="120" text-anchor="middle" fill="#1a1a1a" font-size="12">rivals cannot match it</text>
          <text x="570" y="142" text-anchor="middle" fill="#5C5C5C" font-size="11">defended by something hard to copy</text>
          <text x="570" y="170" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">e.g., Monster 16-oz can</text>

          <!-- Divider -->
          <line x1="60" y1="232" x2="660" y2="232" stroke="#E8E6E1" stroke-width="1.5"/>

          <!-- POP bottom band: neutral (the price of admission) -->
          <text x="60" y="262" font-weight="700" fill="#1a1a1a" font-size="12" letter-spacing="1.6">POINTS OF PARITY (POP) · EARN CATEGORY MEMBERSHIP</text>
          <text x="60" y="280" fill="#7A7A7A" font-size="12" font-style="italic">three sub-types the firm runs into</text>
          <rect x="60" y="296" width="180" height="138" fill="#F8F9FA" stroke="#BDB7AC" stroke-width="1.2" rx="2"/>
          <text x="150" y="322" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="14">CATEGORY</text>
          <text x="150" y="348" text-anchor="middle" fill="#1a1a1a" font-size="12">required to be in the category</text>
          <text x="150" y="370" text-anchor="middle" fill="#5C5C5C" font-size="11">a coffee shop must serve coffee</text>
          <text x="150" y="406" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">absence disqualifies the brand</text>
          <rect x="270" y="296" width="180" height="138" fill="#F8F9FA" stroke="#BDB7AC" stroke-width="1.2" rx="2"/>
          <text x="360" y="322" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="14">CORRELATIONAL</text>
          <text x="360" y="348" text-anchor="middle" fill="#1a1a1a" font-size="12">neutralizes a trade-off</text>
          <text x="360" y="370" text-anchor="middle" fill="#5C5C5C" font-size="11">low price and high quality at once</text>
          <text x="360" y="406" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">e.g., Trader Joe's private label</text>
          <rect x="480" y="296" width="180" height="138" fill="#F8F9FA" stroke="#BDB7AC" stroke-width="1.2" rx="2"/>
          <text x="570" y="322" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="14">COMPETITIVE</text>
          <text x="570" y="348" text-anchor="middle" fill="#1a1a1a" font-size="12">neutralizes a rival's POD</text>
          <text x="570" y="370" text-anchor="middle" fill="#5C5C5C" font-size="11">match the attribute a rival leads on</text>
          <text x="570" y="406" text-anchor="middle" fill="#7A7A7A" font-size="10.5" font-style="italic">e.g., Visa "accepted anywhere" vs AmEx</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Keller, <em>Strategic Brand Management</em>; Kotler, Keller &amp; Chernev 16e (2022), Chs. 6–7</p>
  </section>
</body>
</html>
