<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 6 STP · 03 · STP funnel exhibit</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 03 · EXHIBIT · STP funnel (lifted from chapter fig-1; reveal/term stripped) -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">STP runs in one direction. <em>You cannot position before you target, or target before you segment.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 6.1 · The STP funnel · segment → target → position</span>
      <svg viewBox="0 0 720 380" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The three-stage STP funnel: all buyers narrow to a few segments, which narrow to one position in the target buyer's mind.">
        <defs>
          <linearGradient id="stp-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#DA7756" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#DA7756" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
        <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#1a1a1a">
          <!-- Funnel body: the ONE coral element, carrying the narrowing claim -->
          <polygon points="60,40 660,40 540,160 540,260 180,260 180,160" fill="url(#stp-fill)" stroke="#DA7756" stroke-width="2"/>
          <!-- Stage 1: SEGMENT -->
          <line x1="60" y1="80" x2="660" y2="80" stroke="#A39E94" stroke-width="0.8" stroke-dasharray="3,3"/>
          <text x="360" y="64" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="13" letter-spacing="1.6">SEGMENT</text>
          <text x="360" y="100" text-anchor="middle" fill="#4A4A4A" font-size="12">cut the market into needs-based slices</text>
          <text x="360" y="116" text-anchor="middle" fill="#7A7A7A" font-size="11" font-style="italic">geographic / demographic / psychographic / behavioral</text>
          <!-- Stage 2: TARGET -->
          <line x1="180" y1="170" x2="540" y2="170" stroke="#A39E94" stroke-width="0.8" stroke-dasharray="3,3"/>
          <text x="360" y="148" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="13" letter-spacing="1.6">TARGET</text>
          <text x="360" y="194" text-anchor="middle" fill="#4A4A4A" font-size="12">pick the segments worth serving</text>
          <text x="360" y="210" text-anchor="middle" fill="#7A7A7A" font-size="11" font-style="italic">compatibility &times; attractiveness</text>
          <!-- Stage 3: POSITION -->
          <text x="360" y="240" text-anchor="middle" font-weight="700" fill="#1a1a1a" font-size="13" letter-spacing="1.6">POSITION</text>
          <text x="360" y="280" text-anchor="middle" fill="#4A4A4A" font-size="12">decide how to be remembered in the buyer's head</text>
          <text x="360" y="296" text-anchor="middle" fill="#7A7A7A" font-size="11" font-style="italic">points of parity &amp; difference, the brand mantra</text>
          <!-- Outputs at bottom -->
          <line x1="60" y1="320" x2="660" y2="320" stroke="#A39E94" stroke-width="0.6"/>
          <text x="120" y="340" text-anchor="middle" fill="#1a1a1a" font-weight="600" font-size="11">all buyers</text>
          <text x="120" y="356" text-anchor="middle" fill="#7A7A7A" font-size="10" font-style="italic">market</text>
          <text x="360" y="340" text-anchor="middle" fill="#1a1a1a" font-weight="600" font-size="11">several similar buyer groups</text>
          <text x="360" y="356" text-anchor="middle" fill="#7A7A7A" font-size="10" font-style="italic">segments</text>
          <text x="600" y="340" text-anchor="middle" fill="#1a1a1a" font-weight="600" font-size="11">one position in the target's mind</text>
          <text x="600" y="356" text-anchor="middle" fill="#7A7A7A" font-size="10" font-style="italic">positioning output</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Ries &amp; Trout (2001); Kotler, Keller &amp; Chernev, <em>Marketing Management</em> 16e (2022), Chs. 6–7</p>
  </section>
</body>
</html>
