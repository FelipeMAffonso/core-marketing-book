<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 6 STP · 08 · Divider · Targeting</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.divider{
    padding:64px 72px; display:flex; flex-direction:column; justify-content:center;
    background:#ffffff;
    border-left:6px solid var(--accent);
  }
  .divider .part{
    font-size:11px; font-weight:600; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--ink-mute);
    margin-bottom:18px;
  }
  .divider .num{
    font-size:160px; font-weight:300; line-height:1;
    color:var(--accent); letter-spacing:-0.03em;
    margin-bottom:8px;
  }
  .divider h2{
    font-size:50px; font-weight:500; line-height:1.08;
    color:var(--ink); letter-spacing:-0.02em;
    max-width: 20ch;
  }
  .divider h2 em{ font-style:italic; color:var(--accent); font-weight:400; }
  .divider .sub{
    font-size:22px; color:var(--ink-soft); font-weight:400;
    line-height:1.45; margin-top:22px; max-width:46ch; font-style:italic;
  }
  .divider .bar{ width:180px; height:1px; background:var(--rule); margin-top:28px; }
</style>
</head>
<body>
  <!-- 08 · SECTION DIVIDER · targeting -->
  <section class="slide divider">
    <div class="part">Part 2 of 3 · Targeting</div>
    <div class="num">02</div>
    <h2>Targeting hunts for the segment <em>you can win</em>.</h2>
    <p class="sub">Not the biggest one. The size of the prize is what makes losing the fight expensive.</p>
    <div class="bar"></div>
  </section>
</body>
</html>
