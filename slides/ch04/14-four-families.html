<!doctype html>
<html lang="en">

<meta charset="utf-8"/>
<title>Ch 4 How Buyers Buy · 14 · Four families of shortcuts</title>

<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:10px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;

<body>
  <!-- 14 · EXHIBIT · four families of shortcuts absorbing Cialdini's seven principles + the behavioral-economics levers. ONE coral element = the central brace mapping seven principles onto four families (the claim is the absorption, not any one family). Family cards stay neutral. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Four families of shortcuts <em>absorb Cialdini's seven principles</em> and the behavioral-economics levers.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 4.7 · The four families &middot; what runs when the buyer is not deliberating</span>
      <svg viewBox="0 0 720 384" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Four neutral family cards: social runs on other people, authority on credentialed roles, loss-and-scarcity on the pain of missing out, and reference-point on whichever number comes first. A coral brace across the top maps Cialdini's seven principles onto these four families, which is the claim the slide makes.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- coral mapping brace across the top: the ONE coral element -->
          <path d="M 40 40 L 40 30 L 680 30 L 680 40" fill="none" stroke="#DA7756" stroke-width="2.4"/>
          <line x1="360" y1="30" x2="360" y2="18" stroke="#DA7756" stroke-width="2.4"/>
          <text x="360" y="14" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B8553A">7 Cialdini principles + behavioral levers, sorted into 4 families</text>

          <!-- four family cards, neutral -->
          <!-- card 1: social -->
          <rect x="40" y="58" width="150" height="298" rx="2" fill="#F8F9FA" stroke="#9A9386" stroke-width="1.3"/>
          <text x="115" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">SOCIAL</text>
          <text x="115" y="105" text-anchor="middle" font-size="11.5" fill="#5C5C5C" font-style="italic">runs on other people</text>
          <g font-size="13" fill="#333333" text-anchor="middle">
            <text x="115" y="146">social proof</text>
            <text x="115" y="176">liking</text>
            <text x="115" y="206">unity</text>
          </g>
          <text x="115" y="332" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Tupperware,</text>
          <text x="115" y="348" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Amazon reviews</text>

          <!-- card 2: authority -->
          <rect x="206" y="58" width="150" height="298" rx="2" fill="#F8F9FA" stroke="#9A9386" stroke-width="1.3"/>
          <text x="281" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">AUTHORITY</text>
          <text x="281" y="105" text-anchor="middle" font-size="11.5" fill="#5C5C5C" font-style="italic">runs on credentials</text>
          <g font-size="13" fill="#333333" text-anchor="middle">
            <text x="281" y="146">credentialed</text>
            <text x="281" y="176">role-coded</text>
            <text x="281" y="206">affiliation seal</text>
          </g>
          <text x="281" y="332" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Bickman 42% &rarr; 92%</text>
          <text x="281" y="348" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">on a uniform alone</text>

          <!-- card 3: loss-and-scarcity -->
          <rect x="372" y="58" width="150" height="298" rx="2" fill="#F8F9FA" stroke="#9A9386" stroke-width="1.3"/>
          <text x="447" y="86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1a1a1a">LOSS &amp; SCARCITY</text>
          <text x="447" y="105" text-anchor="middle" font-size="11.5" fill="#5C5C5C" font-style="italic">pain of missing out</text>
          <g font-size="13" fill="#333333" text-anchor="middle">
            <text x="447" y="142">reciprocity</text>
            <text x="447" y="168">commitment</text>
            <text x="447" y="194">scarcity</text>
          </g>
          <text x="447" y="220" text-anchor="middle" font-size="12" fill="#333333">endowment, present bias</text>
          <text x="447" y="332" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Costco samples,</text>
          <text x="447" y="348" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">Klarna, color drops</text>

          <!-- card 4: reference-point -->
          <rect x="538" y="58" width="142" height="298" rx="2" fill="#F8F9FA" stroke="#9A9386" stroke-width="1.3"/>
          <text x="609" y="86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1a1a1a">REFERENCE POINT</text>
          <text x="609" y="105" text-anchor="middle" font-size="11.5" fill="#5C5C5C" font-style="italic">the number seen first</text>
          <g font-size="13" fill="#333333" text-anchor="middle">
            <text x="609" y="142">anchoring</text>
            <text x="609" y="168">framing</text>
            <text x="609" y="194">mental accounting</text>
          </g>
          <text x="609" y="220" text-anchor="middle" font-size="11.5" fill="#333333">defaults, joint vs separate</text>
          <text x="609" y="332" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">tiered rate cards,</text>
          <text x="609" y="348" text-anchor="middle" font-size="11" fill="#7A7A7A" font-style="italic">opt-in vs opt-out</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Cialdini, <em>Influence</em> (rev. 2006, 2021); Kahneman &amp; Tversky (1979); Thaler &amp; Sunstein, <em>Nudge</em> (2008)</p>
  </section>
