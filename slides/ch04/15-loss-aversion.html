<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 4 How Buyers Buy · 15 · The value function</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 15 · EXHIBIT · the prospect-theory value function (lifted from chapter sk-loss-aversion-mount; redrawn clean). ONE coral element = the loss leg, drawn steeper, the asymmetry that powers the loss-and-scarcity family. Gain leg in gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">A dollar lost weighs about twice a dollar gained, and <em>that asymmetry is the marketer's lever</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 4.8 · The prospect-theory value function &middot; gains gentle, losses steep</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The prospect-theory value function. The gain leg, drawn in gray, rises gently to the right and flattens. The loss leg, drawn in coral, drops steeply to the left, about two and a quarter times as steep. The reference point at the origin sets the zero, and the steeper loss leg carries the claim.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- axes; origin at (360,150) -->
          <line x1="70" y1="150" x2="650" y2="150" stroke="#1a1a1a" stroke-width="1.4"/>
          <line x1="360" y1="40" x2="360" y2="270" stroke="#1a1a1a" stroke-width="1.4"/>
          <text x="642" y="142" text-anchor="end" font-size="12" fill="#5C5C5C" font-style="italic">gains &rarr;</text>
          <text x="78" y="142" text-anchor="start" font-size="12" fill="#5C5C5C" font-style="italic">&larr; losses</text>
          <text x="368" y="52" text-anchor="start" font-size="12" fill="#5C5C5C" font-style="italic">value</text>
          <text x="372" y="168" text-anchor="start" font-size="11" fill="#7A7A7A" font-style="italic">reference point sets the zero</text>

          <!-- gain leg: gray, gentle concave (sqrt), to the right and up. samples scaled. -->
          <path d="M 360 150 Q 430 116 500 102 T 640 90" fill="none" stroke="#BDB7AC" stroke-width="2.4"/>
          <!-- loss leg: CORAL, steep convex, to the left and down (~2.25x). -->
          <path d="M 360 150 Q 300 196 250 222 T 110 256" fill="none" stroke="#DA7756" stroke-width="3"/>

          <!-- reference markers showing the asymmetry: equal x-distance, unequal value -->
          <line x1="250" y1="150" x2="250" y2="222" stroke="#DA7756" stroke-width="1.1" stroke-dasharray="3,2"/>
          <line x1="470" y1="150" x2="470" y2="106" stroke="#BDB7AC" stroke-width="1.1" stroke-dasharray="3,2"/>

          <text x="500" y="84" text-anchor="middle" font-size="12" fill="#7A7A7A" font-style="italic">a gain feels less and less</text>
          <text x="168" y="232" text-anchor="middle" font-size="12.5" fill="#B8553A" font-weight="700">a loss feels ~2.25x as bad</text>

          <text x="360" y="292" text-anchor="middle" font-size="11" fill="#888888" font-style="italic">framing sets where the zero sits, so the same dollar can read as a gain to chase or a loss to avoid</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Kahneman &amp; Tversky, "Prospect Theory," <em>Econometrica</em> (1979); the S-shaped value function</p>
  </section>
</body>
</html>
