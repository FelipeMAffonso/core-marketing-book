<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 4 How Buyers Buy · 17 · The consideration set</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 17 · EXHIBIT · the consideration set (lifted from chapter sk-consid-set-mount; redrawn clean). ONE coral element = Brand A, the first-recalled brand that wins ~30% before any comparison. The other retrieved brands and the submerged set stay gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">About three brands come to mind, and <em>the first recalled wins roughly 30% before any comparison runs</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 4.9 · The consideration set &middot; what the buyer retrieves at the moment of need</span>
      <svg viewBox="0 0 720 296" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Inside an outline of the buyer's recalled set sit three brand circles. Brand A, drawn in coral, is the first recalled and wins about 30 percent of choices. Brands B and C are gray. Outside the set, faint dashed circles show the dozens of brands never retrieved unaided. Half of buyers consider only one brand.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">inside the buyer's head, at the moment of need</text>

          <!-- the recalled-set boundary -->
          <ellipse cx="360" cy="150" rx="300" ry="86" fill="#F8F9FA" stroke="#9A9386" stroke-width="1.6"/>

          <!-- submerged brands outside, faint dashed -->
          <circle cx="96"  cy="86"  r="20" fill="none" stroke="#C7C1B5" stroke-width="1" stroke-dasharray="3,3"/>
          <circle cx="628" cy="92"  r="17" fill="none" stroke="#C7C1B5" stroke-width="1" stroke-dasharray="3,3"/>
          <circle cx="108" cy="214" r="15" fill="none" stroke="#C7C1B5" stroke-width="1" stroke-dasharray="3,3"/>
          <circle cx="620" cy="216" r="16" fill="none" stroke="#C7C1B5" stroke-width="1" stroke-dasharray="3,3"/>

          <!-- Brand B and C: gray -->
          <circle cx="360" cy="150" r="64" fill="#ffffff" stroke="#9A9386" stroke-width="1.8"/>
          <text x="360" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#5C5C5C">BRAND B</text>
          <circle cx="510" cy="150" r="56" fill="#ffffff" stroke="#9A9386" stroke-width="1.6"/>
          <text x="510" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#5C5C5C">BRAND C</text>

          <!-- Brand A: the ONE coral element, first recalled -->
          <circle cx="210" cy="150" r="68" fill="#FDF6F3" stroke="#DA7756" stroke-width="3"/>
          <text x="210" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#B8553A">BRAND A</text>
          <text x="210" y="166" text-anchor="middle" font-size="11" fill="#B8553A" font-style="italic">first recalled</text>

          <text x="360" y="262" text-anchor="middle" font-size="12.5" fill="#B8553A" font-weight="700">about 3 brands retrieved clearly &middot; 50% of buyers consider only one</text>
          <text x="360" y="282" text-anchor="middle" font-size="11.5" fill="#5C5C5C" font-style="italic">dozens of others sit submerged, never retrieved unaided, invisible at the moment of choice</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Sharp, <em>How Brands Grow</em> (Ehrenberg-Bass, 2010); panel data, 2&ndash;8 brands per set, modally about 3</p>
  </section>
</body>
</html>
