<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 9 Services · 11 · A service blueprint</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:10px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:12px 22px 10px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 11 · EXHIBIT · a coffee-shop service blueprint built from the chapter's five-swimlane spec. ONE coral element = the line of visibility, the seam the chapter says is the whole point of the diagram. Swimlane boxes are gray; the two likely failure points are gray dashed rings, not coral. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The five swimlanes split at <em>the line of visibility</em>, the seam between what the buyer sees and what produces it.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 9.4 · A campus coffee-cart blueprint · five swimlanes, two likely failure points</span>
      <svg viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A coffee-shop service blueprint with five horizontal swimlanes: physical evidence, customer actions, on-stage staff, the line of visibility, back-stage staff, and support processes. The line of visibility is drawn in coral as the seam between what the buyer sees above it and what produces the service below it. Two likely failure points, the greeting and the drink handoff, are circled in gray.">
        <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#1a1a1a">
          <!-- column headers: the five steps left to right -->
          <text x="250" y="20" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5C5C5C">arrive</text>
          <text x="360" y="20" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5C5C5C">order</text>
          <text x="470" y="20" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5C5C5C">pay</text>
          <text x="580" y="20" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5C5C5C">wait + receive</text>

          <!-- swimlane labels (left gutter) -->
          <g font-size="10" font-weight="700" fill="#5C5C5C" letter-spacing="0.4">
            <text x="14" y="48">PHYSICAL</text><text x="14" y="60">EVIDENCE</text>
            <text x="14" y="92">CUSTOMER</text><text x="14" y="104">ACTIONS</text>
            <text x="14" y="136">ON-STAGE</text><text x="14" y="148">STAFF</text>
            <text x="14" y="216">BACK-STAGE</text><text x="14" y="228">STAFF</text>
            <text x="14" y="276">SUPPORT</text><text x="14" y="288">PROCESSES</text>
          </g>

          <!-- swimlane separators (gray) -->
          <g stroke="#E5DFD2" stroke-width="1">
            <line x1="120" y1="70" x2="700" y2="70"/>
            <line x1="120" y1="115" x2="700" y2="115"/>
            <line x1="120" y1="240" x2="700" y2="240"/>
          </g>

          <!-- ROW: physical evidence (gray boxes) -->
          <g fill="#fff" stroke="#A39E94" stroke-width="0.8">
            <rect x="205" y="32" width="90" height="30"/><rect x="315" y="32" width="90" height="30"/>
            <rect x="425" y="32" width="90" height="30"/><rect x="535" y="32" width="90" height="30"/>
          </g>
          <g font-size="9.5" fill="#5C5C5C" text-anchor="middle">
            <text x="250" y="50">menu board, cart</text>
            <text x="360" y="50">tap-to-pay sign</text>
            <text x="470" y="50">receipt screen</text>
            <text x="580" y="50">handoff counter</text>
          </g>

          <!-- ROW: customer actions (gray) -->
          <g fill="#F8F9FA" stroke="#A39E94" stroke-width="0.8">
            <rect x="205" y="78" width="90" height="30"/><rect x="315" y="78" width="90" height="30"/>
            <rect x="425" y="78" width="90" height="30"/><rect x="535" y="78" width="90" height="30"/>
          </g>
          <g font-size="9.5" fill="#1a1a1a" text-anchor="middle">
            <text x="250" y="96">walk up</text>
            <text x="360" y="96">say the order</text>
            <text x="470" y="96">tap the phone</text>
            <text x="580" y="96">take the cup</text>
          </g>

          <!-- ROW: on-stage staff (gray) -->
          <g fill="#F8F9FA" stroke="#A39E94" stroke-width="0.8">
            <rect x="205" y="123" width="90" height="30"/><rect x="315" y="123" width="90" height="30"/>
            <rect x="425" y="123" width="90" height="30"/><rect x="535" y="123" width="90" height="30"/>
          </g>
          <g font-size="9.5" fill="#1a1a1a" text-anchor="middle">
            <text x="250" y="141">greet</text>
            <text x="360" y="141">enter order</text>
            <text x="470" y="141">confirm total</text>
            <text x="580" y="141">call the name</text>
          </g>

          <!-- the LINE OF VISIBILITY: the ONE coral element -->
          <line x1="120" y1="170" x2="700" y2="170" stroke="#DA7756" stroke-width="3"/>
          <rect x="300" y="160" width="170" height="18" fill="#FDF6F3" stroke="#DA7756" stroke-width="1"/>
          <text x="385" y="173" text-anchor="middle" font-size="10.5" font-weight="700" fill="#B8553A" letter-spacing="0.6">LINE OF VISIBILITY</text>

          <!-- ROW: back-stage staff (gray) -->
          <g fill="#fff" stroke="#A39E94" stroke-width="0.8">
            <rect x="315" y="185" width="90" height="30"/><rect x="535" y="185" width="90" height="30"/>
          </g>
          <g font-size="9.5" fill="#5C5C5C" text-anchor="middle">
            <text x="360" y="203">pull espresso</text>
            <text x="580" y="203">steam, assemble</text>
          </g>

          <!-- ROW: support processes (gray) -->
          <g fill="#FBFAF6" stroke="#A39E94" stroke-width="0.8">
            <rect x="315" y="250" width="90" height="30"/><rect x="535" y="250" width="90" height="30"/>
          </g>
          <g font-size="9.5" fill="#5C5C5C" text-anchor="middle">
            <text x="360" y="268">POS + payment</text>
            <text x="580" y="268">bean + milk stock</text>
          </g>

          <!-- two likely failure points: gray dashed rings (NOT coral) -->
          <ellipse cx="250" cy="138" rx="40" ry="22" fill="none" stroke="#7A7A7A" stroke-width="1.2" stroke-dasharray="4,3"/>
          <ellipse cx="580" cy="92" rx="40" ry="22" fill="none" stroke="#7A7A7A" stroke-width="1.2" stroke-dasharray="4,3"/>
          <text x="250" y="300" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">failure point: the greeting</text>
          <text x="580" y="300" text-anchor="middle" font-size="10" fill="#7A7A7A" font-style="italic">failure point: the handoff</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Shostack, &ldquo;Designing Services That Deliver,&rdquo; <em>Harvard Business Review</em> (1984)</p>
  </section>
</body>
</html>
