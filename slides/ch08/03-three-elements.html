<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 8 Product Management · 03 · The three-element offer</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 03 · EXHIBIT · the three-element offer, lifted from chapter fig-three-elements (concentric layers).
       Gradients stripped to a single coral fill on the product core; the ONE coral element is the product core,
       the thing the buyer takes ownership of, with service and brand as gray context rings around it. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">A product is three things at once, and <em>a weak leg drags the value of the other two</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 8.1 · The offer as concentric layers · product → service → brand</span>
      <svg viewBox="0 0 720 330" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The three-element offering as concentric layers: the product core the buyer owns, the service the firm wraps around it, and the brand meaning carried to the shelf. The product core is drawn in coral; service and brand are gray context rings.">
        <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#1a1a1a">
          <!-- the three rings: brand (outer, gray), service (middle, gray), product (core, coral claim) -->
          <circle cx="210" cy="165" r="140" fill="#ffffff" stroke="#BDB7AC" stroke-width="1.4"/>
          <circle cx="210" cy="165" r="93"  fill="#ffffff" stroke="#BDB7AC" stroke-width="1.4"/>
          <circle cx="210" cy="165" r="50"  fill="#DA7756" stroke="#B8553A" stroke-width="2"/>
          <text x="210" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">PRODUCT</text>
          <text x="210" y="100" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5C5C5C">SERVICE</text>
          <text x="210" y="48"  text-anchor="middle" font-size="12.5" font-weight="700" fill="#5C5C5C">BRAND</text>

          <!-- leader lines to the right-hand legend -->
          <line x1="260" y1="165" x2="430" y2="205" stroke="#B8553A" stroke-width="0.9"/>
          <line x1="210" y1="100" x2="430" y2="120" stroke="#7A7A7A" stroke-width="0.9"/>
          <line x1="210" y1="48"  x2="430" y2="58"  stroke="#7A7A7A" stroke-width="0.9"/>

          <g font-size="12.5" fill="#1a1a1a">
            <text x="442" y="62"  font-weight="700" fill="#5C5C5C">BRAND</text>
            <text x="442" y="80"  fill="#4A4A4A">the meaning the buyer attaches</text>
            <text x="442" y="96"  fill="#7A7A7A" font-style="italic">"murder your thirst" · family rotisserie chicken</text>

            <text x="442" y="124" font-weight="700" fill="#5C5C5C">SERVICE</text>
            <text x="442" y="142" fill="#4A4A4A">the work the firm does around the good</text>
            <text x="442" y="158" fill="#7A7A7A" font-style="italic">cold-cooler placement · 70 repair centers</text>

            <text x="442" y="208" font-weight="700" fill="#B8553A">PRODUCT</text>
            <text x="442" y="226" fill="#4A4A4A">the tangible good the buyer owns</text>
            <text x="442" y="242" fill="#7A7A7A" font-style="italic">16.9-oz tallboy can · 40-oz tumbler · the bird</text>
          </g>

          <text x="210" y="322" text-anchor="middle" font-size="11" fill="#5C5C5C" font-style="italic">a weak element on any layer drags the value of the other two</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Kotler, Keller &amp; Chernev, <em>Marketing Management</em> 16e (2022), Ch. 8; three-element offering decomposition</p>
  </section>
</body>
</html>
