<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 8 Product Management · 15 · The chasm</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 15 · EXHIBIT · Rogers' five adopters + Moore's chasm, lifted from chapter fig-4. Gradient stripped; the
       bell curve is gray context and the chasm divider is the ONE coral element (the discontinuity argued about). -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The early majority will not buy what the early adopters bought, and <em>that gap is the chasm</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 8.8 · Rogers' five adopter categories · Moore's chasm between visionaries and pragmatists</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Rogers' diffusion bell curve with five adopter categories: innovators 2.5 percent, early adopters 13.5 percent, early majority 34 percent, late majority 34 percent, laggards 16 percent. The bell curve is gray. Moore's chasm, the discontinuity between early adopters and early majority, is drawn as a coral divider.">
        <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#1a1a1a">
          <!-- axes -->
          <line x1="56" y1="232" x2="688" y2="232" stroke="#1a1a1a" stroke-width="1.2"/>
          <line x1="56" y1="34" x2="56" y2="232" stroke="#1a1a1a" stroke-width="1.2"/>
          <text x="372" y="262" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">time of adoption &rarr;</text>
          <text x="30" y="135" text-anchor="middle" transform="rotate(-90 30 135)" font-size="11.5" font-weight="600" fill="#1a1a1a">share of market</text>
          <!-- bell curve (gray context, no gradient fill) -->
          <path d="M56,232 Q132,214 172,160 Q224,70 296,46 Q392,24 460,68 Q532,150 590,214 Q640,228 688,232" fill="none" stroke="#BDB7AC" stroke-width="2.4" stroke-linecap="round"/>
          <!-- segment dividers (gray) -->
          <line x1="158" y1="34" x2="158" y2="232" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <line x1="424" y1="34" x2="424" y2="232" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <line x1="578" y1="34" x2="578" y2="232" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <!-- THE CHASM: the ONE coral element, between early adopters and early majority -->
          <line x1="236" y1="34" x2="236" y2="232" stroke="#DA7756" stroke-width="2.6" stroke-dasharray="7,4"/>
          <text x="236" y="200" text-anchor="middle" font-size="11" fill="#B8553A" font-weight="700">THE CHASM</text>
          <text x="236" y="214" text-anchor="middle" font-size="10" fill="#B8553A" font-style="italic">(Moore)</text>
          <!-- adopter labels (ink) -->
          <g font-size="10" font-weight="700" fill="#1a1a1a">
            <text x="108" y="58" text-anchor="middle">INNOVATORS</text>
            <text x="198" y="50" text-anchor="middle">EARLY</text>
            <text x="198" y="63" text-anchor="middle">ADOPTERS</text>
            <text x="330" y="58" text-anchor="middle">EARLY MAJORITY</text>
            <text x="500" y="58" text-anchor="middle">LATE MAJORITY</text>
            <text x="632" y="58" text-anchor="middle">LAGGARDS</text>
          </g>
          <!-- percentages (gray) -->
          <g font-size="11" font-weight="600" fill="#5C5C5C">
            <text x="108" y="180" text-anchor="middle">2.5%</text>
            <text x="198" y="150" text-anchor="middle">13.5%</text>
            <text x="330" y="96" text-anchor="middle">34%</text>
            <text x="500" y="112" text-anchor="middle">34%</text>
            <text x="632" y="200" text-anchor="middle">16%</text>
          </g>
          <!-- psychographic labels (gray italic) -->
          <g font-size="9.5" fill="#7A7A7A" font-style="italic">
            <text x="108" y="248" text-anchor="middle">tech enthusiasts</text>
            <text x="198" y="248" text-anchor="middle">visionaries</text>
            <text x="330" y="248" text-anchor="middle">pragmatists</text>
            <text x="500" y="248" text-anchor="middle">conservatives</text>
            <text x="632" y="248" text-anchor="middle">skeptics</text>
          </g>
        </g>
      </svg>
    </div>

    <p class="source">Source: Rogers, <em>Diffusion of Innovations</em> 5e (2003); Moore, <em>Crossing the Chasm</em> 3e (2014)</p>
  </section>
</body>
</html>
