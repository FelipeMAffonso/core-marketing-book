<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 8 Product Management · 12 · The stage-gate funnel</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 12 · EXHIBIT · the stage-gate funnel, lifted from chapter fig-3. Gradient stripped; the coral funnel
       outline is the ONE coral element. Survivor counts (100->1) and stage labels are ink/gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The stage-gate fails bad ideas earlier and cheaper, so <em>roughly 100 ideas narrow to one launch</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 8.7 · The stage-gate funnel · ideas surviving each gate (illustrative)</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The stage-gate new-product-development funnel narrowing from about 100 ideas to one launch across seven stages, with each gate testing desirability, feasibility, or viability. The funnel outline is coral; the survivor counts and stage labels are in ink and gray.">
        <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#1a1a1a">
          <!-- coral funnel outline (the ONE coral element), no gradient fill -->
          <polygon points="48,40 672,40 588,236 132,236" fill="none" stroke="#DA7756" stroke-width="2"/>
          <!-- gate dividers (gray) -->
          <line x1="130" y1="40" x2="145" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <line x1="212" y1="40" x2="232" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <line x1="300" y1="40" x2="330" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <line x1="388" y1="40" x2="428" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <line x1="476" y1="40" x2="516" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <line x1="564" y1="40" x2="604" y2="236" stroke="#BDB7AC" stroke-width="0.9" stroke-dasharray="3,3"/>
          <!-- stage names (ink) -->
          <g font-size="10" font-weight="600" fill="#1a1a1a">
            <text x="88" y="118" text-anchor="middle">IDEA</text>
            <text x="88" y="131" text-anchor="middle">GEN.</text>
            <text x="170" y="118" text-anchor="middle">CONCEPT</text>
            <text x="255" y="118" text-anchor="middle">BUSINESS</text>
            <text x="255" y="131" text-anchor="middle">CASE</text>
            <text x="345" y="118" text-anchor="middle">PROTOTYPE</text>
            <text x="435" y="118" text-anchor="middle">BETA</text>
            <text x="525" y="118" text-anchor="middle">MARKET</text>
            <text x="525" y="131" text-anchor="middle">TEST</text>
            <text x="632" y="118" text-anchor="middle">LAUNCH</text>
          </g>
          <!-- survivor counts (ink, bold) -->
          <g font-size="14" font-weight="700" fill="#1a1a1a">
            <text x="88" y="166" text-anchor="middle">100</text>
            <text x="170" y="166" text-anchor="middle">30</text>
            <text x="255" y="166" text-anchor="middle">12</text>
            <text x="345" y="166" text-anchor="middle">6</text>
            <text x="435" y="166" text-anchor="middle">3</text>
            <text x="525" y="166" text-anchor="middle">2</text>
            <text x="632" y="166" text-anchor="middle">1</text>
          </g>
          <text x="360" y="192" text-anchor="middle" font-size="10.5" fill="#7A7A7A" font-style="italic">ideas surviving each gate (illustrative; figures vary by industry)</text>
          <!-- the three aims (gray) -->
          <g font-size="10.5" fill="#5C5C5C">
            <text x="170" y="216" text-anchor="middle">desirability</text>
            <text x="255" y="216" text-anchor="middle">viability</text>
            <text x="345" y="216" text-anchor="middle">feasibility</text>
          </g>
          <text x="360" y="280" text-anchor="middle" font-size="11.5" fill="#1a1a1a" font-weight="600">each gate asks: does a buyer want it (desirability), can we build it (feasibility), does the business case hold (viability)</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Cooper, <em>Winning at New Products</em>; Kotler, Keller &amp; Chernev 16e (2022), Ch. 18 (Tata Steel illustrative figures)</p>
  </section>
</body>
</html>
