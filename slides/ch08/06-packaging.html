<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 8 Product Management · 06 · Packaging as a designed tool</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 06 · EXHIBIT · packaging as a designed tool (chapter sk-packaging-levels). Two panels: the three nested
       levels (left), the four-test battery (right). ONE coral element = the shelf-recognition test, the one
       Tropicana skipped, which resolves the opening puzzle. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">A package clears four tests before it ships, and Tropicana <em>skipped the one that mattered</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 8.3 · Packaging as a designed tool · three nested levels &middot; the four-test battery</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Left panel: the three nested packaging levels, primary, secondary, and tertiary, each met by a different buyer. Right panel: the four-test battery a new package clears, engineering, visual, dealer, and consumer, with the shelf-recognition consumer test drawn in coral as the test Tropicana skipped.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- LEFT PANEL: three nested levels -->
          <text x="40" y="34" font-size="12" font-weight="700" fill="#5C5C5C" letter-spacing="0.5">THREE NESTED LEVELS</text>
          <rect x="40" y="48" width="280" height="200" fill="none" stroke="#BDB7AC" stroke-width="1.4"/>
          <text x="52" y="68" font-size="12" font-weight="700" fill="#5C5C5C">TERTIARY</text>
          <text x="52" y="84" font-size="11" fill="#7A7A7A" font-style="italic">shipping case + pallet, buyer never sees</text>
          <rect x="74" y="96" width="212" height="138" fill="none" stroke="#BDB7AC" stroke-width="1.4"/>
          <text x="86" y="116" font-size="12" font-weight="700" fill="#5C5C5C">SECONDARY</text>
          <text x="86" y="132" font-size="11" fill="#7A7A7A" font-style="italic">box / multipack, carried home, discarded</text>
          <rect x="108" y="144" width="146" height="78" fill="#F4EDE6" stroke="#BDB7AC" stroke-width="1.4"/>
          <text x="120" y="166" font-size="12" font-weight="700" fill="#1a1a1a">PRIMARY</text>
          <text x="120" y="182" font-size="11" fill="#4A4A4A">the unit the buyer holds</text>
          <text x="120" y="200" font-size="11" fill="#7A7A7A" font-style="italic">the can, the carton</text>
          <text x="181" y="246" text-anchor="middle" font-size="10.5" fill="#5C5C5C" font-style="italic">online, the box at the door is the shelf</text>

          <!-- RIGHT PANEL: four-test battery -->
          <text x="392" y="34" font-size="12" font-weight="700" fill="#5C5C5C" letter-spacing="0.5">THE FOUR-TEST BATTERY</text>
          <!-- three passed tests in gray -->
          <rect x="392" y="48" width="296" height="40" fill="#ffffff" stroke="#BDB7AC" stroke-width="1.2"/>
          <text x="406" y="66" font-size="12.5" font-weight="600" fill="#5C5C5C">Engineering</text>
          <text x="406" y="81" font-size="11" fill="#7A7A7A" font-style="italic">protects the product, survives the supply chain</text>
          <text x="676" y="73" text-anchor="end" font-size="12" fill="#7A7A7A">passed</text>

          <rect x="392" y="92" width="296" height="40" fill="#ffffff" stroke="#BDB7AC" stroke-width="1.2"/>
          <text x="406" y="110" font-size="12.5" font-weight="600" fill="#5C5C5C">Visual</text>
          <text x="406" y="125" font-size="11" fill="#7A7A7A" font-style="italic">type legible, color reads right at arm's length</text>
          <text x="676" y="117" text-anchor="end" font-size="12" fill="#7A7A7A">passed</text>

          <rect x="392" y="136" width="296" height="40" fill="#ffffff" stroke="#BDB7AC" stroke-width="1.2"/>
          <text x="406" y="154" font-size="12.5" font-weight="600" fill="#5C5C5C">Dealer</text>
          <text x="406" y="169" font-size="11" fill="#7A7A7A" font-style="italic">easy for retailers to stock, stack, shelve</text>
          <text x="676" y="161" text-anchor="end" font-size="12" fill="#7A7A7A">passed</text>

          <!-- the skipped test: the ONE coral element -->
          <rect x="392" y="180" width="296" height="58" fill="#FDF6F3" stroke="#DA7756" stroke-width="2"/>
          <text x="406" y="200" font-size="12.5" font-weight="700" fill="#B8553A">Consumer &middot; shelf-recognition</text>
          <text x="406" y="216" font-size="11" fill="#B8553A">can buyers still find the brand in the two</text>
          <text x="406" y="230" font-size="11" fill="#B8553A">seconds they actually scan?</text>
          <text x="676" y="213" text-anchor="end" font-size="12" font-weight="700" fill="#B8553A">SKIPPED</text>

          <text x="540" y="262" text-anchor="middle" font-size="10.5" fill="#5C5C5C" font-style="italic">the package does three jobs: contain and protect, communicate the brand, aid use</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Kotler, Keller &amp; Chernev 16e (2022), &ldquo;Managing Packaging&rdquo;; Stukent, <em>Marketing Manifested</em> 2026, Ch. 6 §4</p>
  </section>
</body>
</html>
