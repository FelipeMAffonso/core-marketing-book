<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 8 Product Management · 10 · The PLC curve</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 10 · EXHIBIT · the four-stage PLC, lifted from chapter fig-1. Gradient fill stripped; the sales curve is
       the ONE coral element. Profit line, axes, and the four stage labels are gray context. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Each stage hands the marketer a different job, so <em>one playbook never fits all four</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 8.5 · The product life cycle · sales over time in four stages</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The four-stage product life cycle. The coral sales curve rises through introduction and growth, plateaus in maturity, and falls in decline. A gray dashed profit line lags. The strategic priority is labeled under each stage: build awareness, build distribution and defend the lead, defend share and extend the curve, then harvest or divest.">
        <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#1a1a1a">
          <!-- axes -->
          <line x1="60" y1="230" x2="690" y2="230" stroke="#1a1a1a" stroke-width="1.2"/>
          <line x1="60" y1="30" x2="60" y2="230" stroke="#1a1a1a" stroke-width="1.2"/>
          <text x="375" y="262" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">time &rarr;</text>
          <text x="32" y="130" text-anchor="middle" transform="rotate(-90 32 130)" font-size="11.5" font-weight="600" fill="#1a1a1a">sales &amp; profit &rarr;</text>
          <!-- stage dividers -->
          <line x1="215" y1="30" x2="215" y2="230" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <line x1="375" y1="30" x2="375" y2="230" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <line x1="535" y1="30" x2="535" y2="230" stroke="#BDB7AC" stroke-width="0.8" stroke-dasharray="3,3"/>
          <!-- stage labels (gray) -->
          <g font-size="10.5" font-weight="700" fill="#5C5C5C">
            <text x="140" y="46" text-anchor="middle">INTRODUCTION</text>
            <text x="295" y="46" text-anchor="middle">GROWTH</text>
            <text x="455" y="46" text-anchor="middle">MATURITY</text>
            <text x="612" y="46" text-anchor="middle">DECLINE</text>
          </g>
          <!-- profit line (gray dashed context) -->
          <path d="M60,226 Q140,228 215,220 Q295,178 375,108 Q455,100 535,130 Q612,180 690,214" fill="none" stroke="#7A7A7A" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="6,4"/>
          <!-- sales curve: the ONE coral element -->
          <path d="M60,222 Q140,214 215,182 Q295,118 375,70 Q455,70 535,104 Q612,156 690,210" fill="none" stroke="#DA7756" stroke-width="2.8" stroke-linecap="round"/>
          <!-- per-stage strategic priority (gray) -->
          <g font-size="11" fill="#5C5C5C" font-style="italic">
            <text x="140" y="160" text-anchor="middle">build awareness</text>
            <text x="295" y="96" text-anchor="middle">build distribution,</text>
            <text x="295" y="110" text-anchor="middle">defend the lead</text>
            <text x="455" y="158" text-anchor="middle">defend share,</text>
            <text x="455" y="172" text-anchor="middle">extend the curve</text>
            <text x="612" y="120" text-anchor="middle">harvest</text>
            <text x="612" y="134" text-anchor="middle">or divest</text>
          </g>
          <!-- direct labels: which line is which (no legend) -->
          <text x="664" y="200" font-size="11" font-weight="700" fill="#B8553A">sales</text>
          <text x="664" y="226" font-size="11" fill="#7A7A7A">profit</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: Kotler, Keller &amp; Chernev 16e (2022), Ch. 17; four-stage PLC and per-stage strategy</p>
  </section>
</body>
</html>
