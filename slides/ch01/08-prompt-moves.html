<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 1 AI Foundations · 08 · The prompt moves</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 08 · EXHIBIT · the five prompt moves climbing the answer-quality bar (lifted from the chapter's sk-howtoask sketch; recolored to one coral). ONE coral element = the final built bar, the answer with all the context handed over. The bare prompt and each add-on bar are gray. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Each move climbs the answer-quality bar; the win is <em>the context you hand over</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 1.3 · The five durable prompt moves &middot; the same request, built up one move at a time</span>
      <svg viewBox="0 0 640 268" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="A bare prompt answers thinly. Clipping on a role, an example, the constraints, and the source material raises the answer-quality bar each step, and the final built prompt is shown in coral. An ask-me-first tag at the end catches what is still missing.">
        <g fill="#1a1a1a">
          <!-- baseline -->
          <line x1="56" y1="210" x2="616" y2="210" stroke="#7A7A7A"/>
          <line x1="56" y1="40" x2="56" y2="210" stroke="#E8E6E1"/>
          <text x="30" y="128" font-size="11" fill="#7A7A7A" text-anchor="middle" font-style="italic" transform="rotate(-90 30 128)">answer quality</text>

          <!-- five rising bars. step ~108px. heights climb: 34,66,100,134,168 -->
          <!-- 1 bare prompt: gray, h34 -->
          <rect x="72"  y="176" width="84" height="34" fill="#D8D2C7"/>
          <text x="114" y="170" text-anchor="middle" font-size="11" fill="#5C5C5C" font-weight="600">bare</text>
          <text x="114" y="228" text-anchor="middle" font-size="11" fill="#1a1a1a">prompt</text>

          <!-- 2 + role: gray, h66 -->
          <rect x="178" y="144" width="84" height="66" fill="#CFC8BC"/>
          <text x="220" y="138" text-anchor="middle" font-size="11" fill="#5C5C5C" font-weight="600">+ role</text>
          <text x="220" y="228" text-anchor="middle" font-size="10.5" fill="#1a1a1a">"you are a..."</text>

          <!-- 3 + example: gray, h100 -->
          <rect x="284" y="110" width="84" height="100" fill="#C6BEB0"/>
          <text x="326" y="104" text-anchor="middle" font-size="11" fill="#5C5C5C" font-weight="600">+ example</text>
          <text x="326" y="228" text-anchor="middle" font-size="10.5" fill="#1a1a1a">one sample</text>

          <!-- 4 + constraints: gray, h134 -->
          <rect x="390" y="76" width="84" height="134" fill="#BDB7AC"/>
          <text x="432" y="70" text-anchor="middle" font-size="11" fill="#5C5C5C" font-weight="600">+ constraints</text>
          <text x="432" y="228" text-anchor="middle" font-size="10.5" fill="#1a1a1a">3 bullets, 12 words</text>

          <!-- 5 + source: the ONE coral element, h168 -->
          <rect x="496" y="42" width="84" height="168" fill="#DA7756"/>
          <text x="538" y="36" text-anchor="middle" font-size="11.5" fill="#B8553A" font-weight="700">+ source</text>
          <text x="538" y="228" text-anchor="middle" font-size="10.5" fill="#1a1a1a" font-weight="600">the brief or CSV</text>

          <!-- ask-me-first tag: sits above the source bar, anchored end so it stays inside the frame -->
          <text x="624" y="64" text-anchor="end" font-size="10.5" fill="#7A7A7A" font-style="italic">then "ask me first" catches</text>
          <text x="624" y="78" text-anchor="end" font-size="10.5" fill="#7A7A7A" font-style="italic">what is still missing</text>

          <text x="340" y="256" text-anchor="middle" font-size="11" fill="#888" font-style="italic">none of these is a magic phrase; "think step by step" is fading because 2026 reasoning models already do it</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: chapter §1.3, How to ask; Anthropic, <em>Effective context engineering for AI agents</em> (2025), engineering blog</p>
  </section>
</body>
</html>
