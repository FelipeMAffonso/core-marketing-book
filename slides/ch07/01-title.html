<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 7 Brands · 01 · Title</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.cover{
    display:flex; flex-direction:column; justify-content:space-between;
    padding:48px 56px;
    background:#ffffff;
    border-top:4px solid var(--accent);
  }
  .cover .course{ display:flex; align-items:center; gap:14px; }
  .cover .course .dot{ width:10px; height:10px; border-radius:50%; background:var(--accent); }
  .cover .course .label{
    font-size:11px; font-weight:600; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--ink-label);
  }
  .cover h1{
    font-size:62px; font-weight:600; line-height:1.05;
    letter-spacing:-0.02em; color:var(--ink);
    max-width: 17ch;
  }
  .cover h1 em{ font-style:italic; color:var(--accent); font-weight:500; }
  .cover .deck-meta{
    font-size:20px; color:var(--ink-soft); font-weight:400;
    margin-top:20px; max-width: 44ch; line-height:1.5;
  }
  .cover footer{
    display:flex; justify-content:space-between; align-items:flex-end;
    font-size:13px; color:var(--ink-mute); letter-spacing:0.04em;
    padding-top:20px; border-top:1px solid var(--rule);
  }
</style>
</head>
<body>
  <!-- 01 · TITLE / COVER -->
  <section class="slide cover">
    <div class="course">
      <span class="dot"></span>
      <span class="label">Chapter 7</span>
    </div>

    <div>
      <h1>Brands and <em>brand management</em>.</h1>
      <p class="deck-meta">A brand is a network of memory connections in a buyer's head. The rest of the chapter unpacks one word of that sentence at a time.</p>
    </div>

    <footer>
      <span>Felipe M. Affonso</span>
      <span>20 slides · ~50 min</span>
    </footer>
  </section>
</body>
</html>
