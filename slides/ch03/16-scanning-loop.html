<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 3 Marketing environment · 16 · The peripheral-vision loop</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 16 · EXHIBIT · the peripheral-vision loop (lifted from chapter sk-environmental-scanning). Scope, Scan, Interpret, Probe, Act, repeating quarterly. ONE coral element = the Probe stage + the diff output, the chapter's "the diff is the deliverable." -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Scope, scan, interpret, probe, act, every quarter, because <em>the diff is the deliverable</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 3.8 · The peripheral-vision loop · a ring that repeats and files a one-page diff against last quarter</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', sans-serif" role="img" aria-label="Five stages in a left-to-right loop: Scope, Scan, Interpret, Probe, Act. Probe is shaded coral, the cheap test under five thousand dollars that separates signal from noise. A coral arrow returns from Act back to Scope, filing the quarterly diff and closing the ring.">
        <g font-size="13" fill="#1a1a1a">
          <!-- five stage nodes across the top row -->
          <!-- Scope -->
          <rect x="22" y="70" width="118" height="64" rx="3" fill="#FFFFFF" stroke="#BDB7AC" stroke-width="1.3"/>
          <text x="81" y="96" text-anchor="middle" font-weight="700" font-size="13.5">Scope</text>
          <text x="81" y="114" text-anchor="middle" font-size="10.5" fill="#7A7A7A">3&ndash;7 outside</text>
          <text x="81" y="127" text-anchor="middle" font-size="10.5" fill="#7A7A7A">domains</text>
          <line x1="140" y1="102" x2="166" y2="102" stroke="#A39E94" stroke-width="1.8" marker-end="url(#l-gray)"/>

          <!-- Scan -->
          <rect x="168" y="70" width="118" height="64" rx="3" fill="#FFFFFF" stroke="#BDB7AC" stroke-width="1.3"/>
          <text x="227" y="96" text-anchor="middle" font-weight="700" font-size="13.5">Scan</text>
          <text x="227" y="114" text-anchor="middle" font-size="10.5" fill="#7A7A7A">2&ndash;3 signals,</text>
          <text x="227" y="127" text-anchor="middle" font-size="10.5" fill="#7A7A7A">named watcher</text>
          <line x1="286" y1="102" x2="312" y2="102" stroke="#A39E94" stroke-width="1.8" marker-end="url(#l-gray)"/>

          <!-- Interpret -->
          <rect x="314" y="70" width="118" height="64" rx="3" fill="#FFFFFF" stroke="#BDB7AC" stroke-width="1.3"/>
          <text x="373" y="96" text-anchor="middle" font-weight="700" font-size="13.5">Interpret</text>
          <text x="373" y="114" text-anchor="middle" font-size="10.5" fill="#7A7A7A">two different</text>
          <text x="373" y="127" text-anchor="middle" font-size="10.5" fill="#7A7A7A">stories</text>
          <line x1="432" y1="102" x2="458" y2="102" stroke="#A39E94" stroke-width="1.8" marker-end="url(#l-gray)"/>

          <!-- Probe: the ONE coral element -->
          <rect x="460" y="70" width="118" height="64" rx="3" fill="#FDF6F3" stroke="#DA7756" stroke-width="2.4"/>
          <text x="519" y="96" text-anchor="middle" font-weight="700" font-size="13.5" fill="#1a1a1a">Probe</text>
          <text x="519" y="114" text-anchor="middle" font-size="10.5" fill="#B8553A">a test under</text>
          <text x="519" y="127" text-anchor="middle" font-size="10.5" fill="#B8553A">$5,000</text>
          <line x1="578" y1="102" x2="604" y2="102" stroke="#A39E94" stroke-width="1.8" marker-end="url(#l-gray)"/>

          <!-- Act -->
          <rect x="606" y="70" width="92" height="64" rx="3" fill="#FFFFFF" stroke="#BDB7AC" stroke-width="1.3"/>
          <text x="652" y="96" text-anchor="middle" font-weight="700" font-size="13.5">Act</text>
          <text x="652" y="114" text-anchor="middle" font-size="10.5" fill="#7A7A7A">only after</text>
          <text x="652" y="127" text-anchor="middle" font-size="10.5" fill="#7A7A7A">the probe</text>

          <!-- return loop: coral, Act -> Scope, filing the diff -->
          <path d="M 652 134 L 652 200 L 81 200 L 81 134" fill="none" stroke="#DA7756" stroke-width="2.4" marker-end="url(#l-coral)"/>
          <rect x="286" y="190" width="148" height="22" fill="#FDF6F3" stroke="#DA7756" stroke-width="1"/>
          <text x="360" y="205" text-anchor="middle" font-size="11.5" fill="#DA7756" font-weight="700">file the quarterly diff</text>

          <text x="360" y="246" text-anchor="middle" font-size="11" fill="#888" font-style="italic">the common failure is jumping straight from Scan to Act; the cheap probe answers what a meeting cannot</text>

          <defs>
            <marker id="l-gray" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L8,4 L0,8" fill="none" stroke="#A39E94" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
            <marker id="l-coral" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4 L0,8" fill="none" stroke="#DA7756" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>
        </g>
      </svg>
    </div>

    <p class="source">Source: Day &amp; Schoemaker, <em>Peripheral Vision</em> (Harvard Business Review Press, 2006); Stanley 2018 arc</p>
  </section>
</body>
</html>
