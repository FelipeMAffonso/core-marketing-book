<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 3 Marketing environment · 02 · Divider · The snapshot trap</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.divider{
    padding:64px 72px; display:flex; flex-direction:column; justify-content:center;
    background:#ffffff;
    border-left:6px solid var(--accent);
  }
  .divider .part{
    font-size:11px; font-weight:600; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--ink-mute);
    margin-bottom:18px;
  }
  .divider .num{
    font-size:160px; font-weight:300; line-height:1;
    color:var(--accent); letter-spacing:-0.03em;
    margin-bottom:8px;
  }
  .divider h2{
    font-size:46px; font-weight:500; line-height:1.1;
    color:var(--ink); letter-spacing:-0.02em;
    max-width: 24ch;
  }
  .divider h2 em{ font-style:italic; color:var(--accent); font-weight:400; }
  .divider .sub{
    font-size:22px; color:var(--ink-soft); font-weight:400;
    line-height:1.45; margin-top:22px; max-width:50ch; font-style:italic;
  }
  .divider .bar{ width:180px; height:1px; background:var(--rule); margin-top:28px; }
</style>
</head>
<body>
  <!-- 02 · SECTION DIVIDER · why marketing reacts at all -->
  <section class="slide divider">
    <div class="part">Part 1 of 6 · Why marketing reacts at all</div>
    <div class="num">01</div>
    <h2>A plan built on one snapshot loses fit <em>the moment the world moves</em>.</h2>
    <p class="sub">Netflix read its world three times before its rivals did, and each read came a year or two early. The brand frozen on last year's picture loses to the one still reading this year's.</p>
    <div class="bar"></div>
  </section>
</body>
</html>
