<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 5 Marketing Research · 03 · The gap exhibit</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 03 · EXHIBIT · the gap (lifted from chapter sk-gap two-circles sketch; reveal/term stripped). Two gray buyer circles; the ONE coral element is the thin overlap band, the only buyers the dashboard could see. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">The buyers you measured and the buyers who want the product <em>can be two different groups</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 5.1 · Stanley 2018 &middot; the sample on the dashboard vs the buyers who wanted the Quencher</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Two barely-touching circles. The left gray circle is the buyers Stanley measured on its dashboard, outdoor and contractor men. The right gray circle is the buyers who actually wanted the Quencher, women 25 to 50. The thin coral overlap between them is the only group the dashboard could see.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- left circle: measured buyers (gray) -->
          <circle cx="270" cy="150" r="118" fill="none" stroke="#7A7A7A" stroke-width="2"/>
          <text x="205" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">buyers Stanley</text>
          <text x="205" y="166" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">measured</text>
          <text x="205" y="188" text-anchor="middle" font-size="12" fill="#7A7A7A" font-style="italic">outdoor &amp; contractor men</text>
          <text x="205" y="240" text-anchor="middle" font-size="11" fill="#7A7A7A">the dashboard</text>

          <!-- right circle: buyers who wanted it (gray) -->
          <circle cx="470" cy="150" r="118" fill="none" stroke="#7A7A7A" stroke-width="2"/>
          <text x="535" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">buyers who</text>
          <text x="535" y="166" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">wanted it</text>
          <text x="535" y="188" text-anchor="middle" font-size="12" fill="#7A7A7A" font-style="italic">women 25 to 50</text>
          <text x="535" y="240" text-anchor="middle" font-size="11" fill="#7A7A7A">never in the data</text>

          <!-- the thin overlap: the ONE coral element -->
          <clipPath id="left"><circle cx="270" cy="150" r="118"/></clipPath>
          <circle cx="470" cy="150" r="118" fill="#DA7756" fill-opacity="0.30" clip-path="url(#left)"/>
          <line x1="370" y1="46" x2="370" y2="254" stroke="#DA7756" stroke-width="1.4" stroke-dasharray="3,3"/>
          <text x="370" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#B8553A">the thin overlap</text>
          <text x="370" y="276" text-anchor="middle" font-size="11" fill="#B8553A">all the dashboard could see</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: CNBC reporting (Dec 2023); Stanley case bible; revenue on the cup line passed $750M by 2023</p>
  </section>
</body>
</html>
