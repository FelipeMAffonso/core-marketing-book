<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 5 Marketing Research · 13 · Laddering</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 13 · EXHIBIT · the laddering climb (lifted from chapter sk-ladder). Three rungs feature -> benefit -> value. ONE coral element = the top rung + flag, the value where the brand has to win. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Laddering climbs from feature to value, and <em>the brand has to win on the third answer</em>.</h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 5.8 · The laddering climb &middot; the same buyer, asked "why does that matter?" three times</span>
      <svg viewBox="0 0 720 290" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The laddering climb drawn as three rising rungs. The bottom rung is the feature (I like the lid). The middle rung is the benefit (it does not leak in my bag). The top rung is the value (I do not want to be the person with stuff dripping down my leg), shaded coral with a brand flag, because the brand has to win there.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- the rising path -->
          <line x1="90" y1="240" x2="630" y2="60" stroke="#E8E6E1" stroke-width="1.4" stroke-dasharray="4,4"/>

          <!-- rung 1: feature (gray) -->
          <rect x="70" y="218" width="220" height="48" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
          <text x="180" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#5C5C5C" letter-spacing="1">FEATURE</text>
          <text x="180" y="258" text-anchor="middle" font-size="12.5" fill="#4A4A4A" font-style="italic">"I like the lid"</text>

          <!-- rung 2: benefit (gray) -->
          <rect x="250" y="128" width="220" height="48" fill="none" stroke="#7A7A7A" stroke-width="1.6"/>
          <text x="360" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#5C5C5C" letter-spacing="1">BENEFIT</text>
          <text x="360" y="168" text-anchor="middle" font-size="12.5" fill="#4A4A4A" font-style="italic">"it doesn't leak in my bag"</text>

          <!-- rung 3: value (the ONE coral element) + flag -->
          <rect x="430" y="38" width="250" height="50" fill="#DA7756" fill-opacity="0.12" stroke="#DA7756" stroke-width="2"/>
          <text x="555" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#B8553A" letter-spacing="1">VALUE</text>
          <text x="555" y="79" text-anchor="middle" font-size="12" fill="#B8553A" font-style="italic">"not the person dripping on the train"</text>
          <!-- brand flag planted on the top rung, kept inside the frame -->
          <line x1="452" y1="38" x2="452" y2="14" stroke="#DA7756" stroke-width="2"/>
          <polygon points="452,14 484,21 452,28" fill="#DA7756"/>
          <text x="492" y="26" font-size="11" fill="#B8553A" font-weight="700">brand wins here</text>

          <!-- the prompts between rungs -->
          <text x="265" y="208" font-size="11" fill="#7A7A7A" font-style="italic">why does that matter?</text>
          <text x="445" y="118" font-size="11" fill="#7A7A7A" font-style="italic">why does that matter?</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: chapter §5.4 laddering; two cups with identical lids still win or lose on the value the brand connects to</p>
  </section>
</body>
</html>
