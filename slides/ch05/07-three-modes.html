<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 5 Marketing Research · 07 · Three modes triangle</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 07 · EXHIBIT · three modes triangle (lifted from chapter fig-2; reveal stripped, font set to Segoe UI). The ONE coral element = the triangle outline (the single shape). Vertex dots are gray so a single coral region carries the claim. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Three modes answer three shapes of question. <em>The shape of the question is what picks the mode.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 5.4 · The three modes of research &middot; qualitative, quantitative, observational</span>
      <svg viewBox="0 0 700 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The three modes of research as one triangle. Qualitative at the top (words, small N, interviews and focus groups). Quantitative at the bottom-left (numbers, large N, surveys and panels and logs). Observational at the bottom-right (behavior, control versus treatment, A/B tests). Most studies need two of three, and qualitative usually goes first.">
        <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#1a1a1a">
          <!-- triangle: the ONE coral element -->
          <polygon points="350,66 130,236 570,236" fill="none" stroke="#DA7756" stroke-width="2"/>
          <!-- vertices: gray dots so one coral region carries the claim -->
          <circle cx="350" cy="66" r="5.5" fill="#7A7A7A"/>
          <text x="350" y="34" text-anchor="middle" font-weight="600">QUALITATIVE</text>
          <text x="350" y="52" text-anchor="middle" fill="#5C5C5C" font-size="12">words, small N &middot; interviews, focus groups</text>
          <circle cx="130" cy="236" r="5.5" fill="#7A7A7A"/>
          <text x="130" y="262" text-anchor="middle" font-weight="600">QUANTITATIVE</text>
          <text x="130" y="280" text-anchor="middle" fill="#5C5C5C" font-size="12">numbers, large N &middot; surveys, panels, logs</text>
          <circle cx="570" cy="236" r="5.5" fill="#7A7A7A"/>
          <text x="570" y="262" text-anchor="middle" font-weight="600">OBSERVATIONAL</text>
          <text x="570" y="280" text-anchor="middle" fill="#5C5C5C" font-size="12">behavior &middot; A/B tests, logs</text>
          <text x="350" y="158" text-anchor="middle" fill="#7A7A7A" font-size="12.5" font-style="italic">most studies need two of three.</text>
          <text x="350" y="178" text-anchor="middle" fill="#7A7A7A" font-size="12.5" font-style="italic">qualitative usually goes first.</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: chapter §5 by-method typology; words about reasoning, numbers about how-many, records of behavior</p>
  </section>
</body>
</html>
