<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ch 5 Marketing Research · 04 · Secondary-data 2x2 exhibit</title>
<link rel="stylesheet" href="../_tokens.css"/>
<style>
  .slide.exh{ display:flex; flex-direction:column; }
  .exh .head{ margin-bottom:12px; }
  .exh .frame{
    background:var(--bg); border:1px solid var(--rule);
    padding:14px 22px 12px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .exh .frame .caption{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:4px;
  }
  .exh svg{ width:100%; height:100%; flex:1; min-height:0; display:block; }
</style>
</head>
<body>
  <!-- 04 · EXHIBIT · secondary-data 2x2 (lifted from chapter sk-secondary-2x2; reveal/term stripped). Four bins split internal/external x free/paid; the ONE coral element is the internal-free cell, where you start. -->
  <section class="slide exh">
    <div class="head">
      <h1 class="title">Secondary data falls into four bins. <em>Start in the internal-free cell you already paid for.</em></h1>
      <div class="rule"></div>
    </div>

    <div class="frame">
      <span class="caption">Exhibit 5.2 · The four bins of secondary data &middot; split by inside-the-firm and by cost to reach</span>
      <svg viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A two-by-two matrix of secondary-data sources. Columns split free versus paid, rows split internal versus external. The internal-free cell (CRM, sales records, the dashboard) is shaded coral as the place to start. External-free is Census, BLS, a competitor's 10-K and job postings, Reddit and TikTok chatter. External-paid is the syndicated panels Nielsen, Euromonitor, and Statista. Internal-paid is rare.">
        <g font-family="'Segoe UI', sans-serif" fill="#1a1a1a">
          <!-- axis labels -->
          <text x="265" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="1">FREE</text>
          <text x="525" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="1">PAID</text>
          <text x="42" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="1" transform="rotate(-90 42 110)">INTERNAL</text>
          <text x="42" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="1" transform="rotate(-90 42 225)">EXTERNAL</text>

          <!-- grid cells -->
          <!-- internal-free: the ONE coral element -->
          <rect x="70" y="50" width="390" height="120" fill="#DA7756" fill-opacity="0.12" stroke="#DA7756" stroke-width="2"/>
          <text x="86" y="76" font-size="13" font-weight="600" fill="#B8553A">Internal &amp; free &middot; start here</text>
          <text x="86" y="100" font-size="12.5" fill="#4A4A4A">Your CRM, sales records, and the</text>
          <text x="86" y="118" font-size="12.5" fill="#4A4A4A">dashboard Stanley was already reading.</text>
          <text x="86" y="148" font-size="11.5" fill="#7A7A7A" font-style="italic">already paid for; read it first</text>

          <!-- internal-paid -->
          <rect x="460" y="50" width="190" height="120" fill="none" stroke="#E8E6E1" stroke-width="1.4"/>
          <text x="476" y="76" font-size="13" font-weight="600" fill="#1a1a1a">Internal &amp; paid</text>
          <text x="476" y="100" font-size="12.5" fill="#4A4A4A">A vendor dashboard or</text>
          <text x="476" y="118" font-size="12.5" fill="#4A4A4A">data tool you license.</text>
          <text x="476" y="148" font-size="11.5" fill="#7A7A7A" font-style="italic">rare</text>

          <!-- external-free -->
          <rect x="70" y="170" width="390" height="110" fill="none" stroke="#E8E6E1" stroke-width="1.4"/>
          <text x="86" y="196" font-size="13" font-weight="600" fill="#1a1a1a">External &amp; free</text>
          <text x="86" y="220" font-size="12.5" fill="#4A4A4A">Census and BLS for who buys; a rival's</text>
          <text x="86" y="238" font-size="12.5" fill="#4A4A4A">10-K and job postings for what it builds;</text>
          <text x="86" y="256" font-size="12.5" fill="#4A4A4A">Reddit and TikTok for live category chatter.</text>

          <!-- external-paid -->
          <rect x="460" y="170" width="190" height="110" fill="none" stroke="#E8E6E1" stroke-width="1.4"/>
          <text x="476" y="196" font-size="13" font-weight="600" fill="#1a1a1a">External &amp; paid</text>
          <text x="476" y="220" font-size="12.5" fill="#4A4A4A">Syndicated panels:</text>
          <text x="476" y="238" font-size="12.5" fill="#4A4A4A">Nielsen, Euromonitor,</text>
          <text x="476" y="256" font-size="12.5" fill="#4A4A4A">Statista.</text>
        </g>
      </svg>
    </div>

    <p class="source">Source: chapter §5 secondary-data taxonomy; Harvard Core Reading §2.2.1; Stukent §2; figures illustrative</p>
  </section>
</body>
</html>
